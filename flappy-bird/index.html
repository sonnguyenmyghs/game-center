<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
  }

  #back-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 100;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #e0e0e0;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #back-btn:hover, #back-btn:active {
    background: rgba(255,255,255,0.2);
    transform: translateY(-1px);
  }

  #back-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  #game-wrapper {
    position: relative;
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: center;
  }

  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(80, 60, 200, 0.3), 0 0 80px rgba(80, 60, 200, 0.1);
  }
</style>
</head>
<body>

<a id="back-btn" href="../index.html">
  <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  Back
</a>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ============================================================
// CONFIGURATION - Easy to customize
// ============================================================
const CONFIG = {
  gravity: 0.4,
  flapStrength: -7,
  pipeSpeed: 2.5,
  pipeGap: 150,
  pipeSpawnInterval: 1800, // ms
  speedIncrement: 0.0005,
  birdSize: 30,
};

// ============================================================
// GAME ENGINE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function resizeCanvas() {
  const maxW = 500;
  const w = Math.min(window.innerWidth, maxW);
  const h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- Game State ---
const STATE = { IDLE: 0, PLAYING: 1, DEAD: 2 };
let gameState = STATE.IDLE;
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest') || '0', 10);
let speedMultiplier = 1;
let frameCount = 0;
let lastPipeSpawn = 0;
let gameOverTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let flashAlpha = 0;

// --- Bird ---
let bird = {
  x: 0, y: 0, vy: 0, rotation: 0,
  wingAngle: 0, wingDir: 1, flapAnim: 0,
  alive: true
};

// --- Pipes ---
let pipes = [];

// --- Particles ---
let particles = [];
let deathParticles = [];

// --- Parallax layers ---
let stars = [];
let farClouds = [];
let nearClouds = [];
let groundOffset = 0;

const GROUND_HEIGHT = 60;

// ============================================================
// INITIALIZATION
// ============================================================
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * (canvas.height - GROUND_HEIGHT),
      size: Math.random() * 2 + 0.5,
      brightness: Math.random() * 0.6 + 0.4,
      twinkleSpeed: Math.random() * 0.03 + 0.01,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

function initClouds() {
  farClouds = [];
  nearClouds = [];
  for (let i = 0; i < 5; i++) {
    farClouds.push({
      x: Math.random() * canvas.width * 1.5,
      y: Math.random() * (canvas.height * 0.4) + 20,
      w: Math.random() * 80 + 50,
      h: Math.random() * 20 + 10,
      speed: 0.15
    });
  }
  for (let i = 0; i < 4; i++) {
    nearClouds.push({
      x: Math.random() * canvas.width * 1.5,
      y: Math.random() * (canvas.height * 0.5) + 30,
      w: Math.random() * 60 + 40,
      h: Math.random() * 15 + 8,
      speed: 0.4
    });
  }
}

function resetGame() {
  bird.x = canvas.width * 0.28;
  bird.y = canvas.height * 0.42;
  bird.vy = 0;
  bird.rotation = 0;
  bird.wingAngle = 0;
  bird.wingDir = 1;
  bird.flapAnim = 0;
  bird.alive = true;

  pipes = [];
  particles = [];
  deathParticles = [];
  score = 0;
  speedMultiplier = 1;
  frameCount = 0;
  lastPipeSpawn = 0;
  gameOverTimer = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  flashAlpha = 0;
  groundOffset = 0;
}

function init() {
  resetGame();
  initStars();
  initClouds();
}

// ============================================================
// INPUT HANDLING
// ============================================================
function handleInput(e) {
  e.preventDefault();

  // Ignore clicks on back button
  if (e.target && e.target.closest('#back-btn')) return;

  if (gameState === STATE.IDLE) {
    gameState = STATE.PLAYING;
    resetGame();
    flap();
  } else if (gameState === STATE.PLAYING) {
    flap();
  } else if (gameState === STATE.DEAD && gameOverTimer > 30) {
    gameState = STATE.IDLE;
    resetGame();
  }
}

canvas.addEventListener('pointerdown', handleInput);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleInput(e);
  }
});

// Prevent scrolling / zooming
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

function flap() {
  if (!bird.alive) return;
  bird.vy = CONFIG.flapStrength;
  bird.flapAnim = 8;

  // Spawn flap particles
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: bird.x - CONFIG.birdSize * 0.3,
      y: bird.y + Math.random() * CONFIG.birdSize * 0.6 - CONFIG.birdSize * 0.3,
      vx: -Math.random() * 2 - 0.5,
      vy: Math.random() * 2 + 1,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 4 + 2,
      color: `hsl(${45 + Math.random() * 20}, 100%, ${70 + Math.random() * 20}%)`
    });
  }
}

// ============================================================
// PIPE MANAGEMENT
// ============================================================
function spawnPipe() {
  const minTop = 60;
  const maxTop = canvas.height - GROUND_HEIGHT - CONFIG.pipeGap - 60;
  const topHeight = Math.random() * (maxTop - minTop) + minTop;

  pipes.push({
    x: canvas.width + 10,
    topHeight: topHeight,
    bottomY: topHeight + CONFIG.pipeGap,
    width: 56,
    scored: false
  });
}

// ============================================================
// COLLISION DETECTION (AABB)
// ============================================================
function checkCollision() {
  const bx = bird.x - CONFIG.birdSize * 0.4;
  const by = bird.y - CONFIG.birdSize * 0.4;
  const bw = CONFIG.birdSize * 0.8;
  const bh = CONFIG.birdSize * 0.8;

  // Ground collision
  if (bird.y + CONFIG.birdSize * 0.5 >= canvas.height - GROUND_HEIGHT) {
    return true;
  }

  // Ceiling collision
  if (bird.y - CONFIG.birdSize * 0.5 <= 0) {
    bird.y = CONFIG.birdSize * 0.5;
    bird.vy = 0;
  }

  // Pipe collision
  for (const pipe of pipes) {
    const px = pipe.x;
    const pw = pipe.width;

    // Top pipe
    if (bx < px + pw && bx + bw > px && by < pipe.topHeight) {
      return true;
    }
    // Bottom pipe
    if (bx < px + pw && bx + bw > px && by + bh > pipe.bottomY) {
      return true;
    }
  }

  return false;
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  frameCount++;

  if (gameState === STATE.PLAYING) {
    // Speed increases over time
    speedMultiplier += CONFIG.speedIncrement;

    // Bird physics
    bird.vy += CONFIG.gravity;
    bird.y += bird.vy;

    // Bird rotation (based on velocity)
    const targetRot = Math.min(Math.max(bird.vy * 0.08, -0.5), Math.PI / 2.2);
    bird.rotation += (targetRot - bird.rotation) * 0.15;

    // Wing flap animation
    if (bird.flapAnim > 0) {
      bird.flapAnim--;
      bird.wingAngle = Math.sin(bird.flapAnim * 0.8) * 0.6;
    } else {
      bird.wingAngle += 0.08 * bird.wingDir;
      if (bird.wingAngle > 0.3 || bird.wingAngle < -0.3) bird.wingDir *= -1;
    }

    // Spawn pipes
    if (frameCount - lastPipeSpawn > (CONFIG.pipeSpawnInterval / (16.67 * speedMultiplier))) {
      spawnPipe();
      lastPipeSpawn = frameCount;
    }

    // Move pipes
    const currentSpeed = CONFIG.pipeSpeed * speedMultiplier;
    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= currentSpeed;

      // Score
      if (!pipes[i].scored && pipes[i].x + pipes[i].width < bird.x) {
        pipes[i].scored = true;
        score++;
      }

      // Remove off-screen
      if (pipes[i].x + pipes[i].width < -20) {
        pipes.splice(i, 1);
      }
    }

    // Scroll ground
    groundOffset = (groundOffset + currentSpeed) % 24;

    // Trail particles
    if (frameCount % 3 === 0) {
      particles.push({
        x: bird.x - CONFIG.birdSize * 0.4,
        y: bird.y,
        vx: -0.5 - Math.random() * 0.5,
        vy: (Math.random() - 0.5) * 0.4,
        life: 1,
        decay: 0.025,
        size: Math.random() * 3 + 1.5,
        color: `hsla(45, 90%, 70%, 0.5)`
      });
    }

    // Collision
    if (checkCollision()) {
      gameState = STATE.DEAD;
      bird.alive = false;
      shakeTimer = 15;
      shakeIntensity = 8;
      flashAlpha = 0.6;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', bestScore.toString());
      }

      // Death particles
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        deathParticles.push({
          x: bird.x,
          y: bird.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: Math.random() * 0.02 + 0.015,
          size: Math.random() * 5 + 2,
          color: `hsl(${40 + Math.random() * 30}, 100%, ${60 + Math.random() * 30}%)`
        });
      }
    }

  } else if (gameState === STATE.IDLE) {
    // Bobbing animation
    bird.y = canvas.height * 0.42 + Math.sin(frameCount * 0.04) * 12;
    bird.wingAngle = Math.sin(frameCount * 0.1) * 0.4;
    bird.rotation = Math.sin(frameCount * 0.04) * 0.05;
  } else if (gameState === STATE.DEAD) {
    gameOverTimer++;

    // Bird falls after death
    bird.vy += CONFIG.gravity;
    bird.y += bird.vy;
    bird.rotation += 0.1;
    if (bird.y + CONFIG.birdSize > canvas.height - GROUND_HEIGHT) {
      bird.y = canvas.height - GROUND_HEIGHT - CONFIG.birdSize;
      bird.vy = 0;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = deathParticles.length - 1; i >= 0; i--) {
    const p = deathParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) deathParticles.splice(i, 1);
  }

  // Shake decay
  if (shakeTimer > 0) shakeTimer--;
  if (flashAlpha > 0) flashAlpha -= 0.04;

  // Parallax clouds
  const scrollSpeed = gameState === STATE.PLAYING ? CONFIG.pipeSpeed * speedMultiplier : 0.5;
  for (const c of farClouds) {
    c.x -= c.speed * (scrollSpeed / CONFIG.pipeSpeed);
    if (c.x + c.w < 0) { c.x = canvas.width + c.w; c.y = Math.random() * canvas.height * 0.4 + 20; }
  }
  for (const c of nearClouds) {
    c.x -= c.speed * (scrollSpeed / CONFIG.pipeSpeed);
    if (c.x + c.w < 0) { c.x = canvas.width + c.w; c.y = Math.random() * canvas.height * 0.5 + 30; }
  }

  // Scroll ground in idle
  if (gameState === STATE.IDLE) {
    groundOffset = (groundOffset + 1) % 24;
  }
}

// ============================================================
// DRAWING
// ============================================================

function drawSkyGradient() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(0.4, '#1a1040');
  grad.addColorStop(0.7, '#2d1b4e');
  grad.addColorStop(1, '#1a1030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawStars() {
  for (const s of stars) {
    const twinkle = Math.sin(frameCount * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.brightness * twinkle;
    ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawClouds(cloudArr, alpha) {
  for (const c of cloudArr) {
    ctx.fillStyle = `rgba(200, 180, 255, ${alpha})`;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w * 0.5, c.h * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.w * 0.25, c.y + c.h * 0.15, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.2, c.y + c.h * 0.1, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  const gy = canvas.height - GROUND_HEIGHT;

  // Ground gradient
  const grad = ctx.createLinearGradient(0, gy, 0, canvas.height);
  grad.addColorStop(0, '#2a1f3d');
  grad.addColorStop(0.15, '#231836');
  grad.addColorStop(1, '#140e22');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gy, canvas.width, GROUND_HEIGHT);

  // Ground top edge
  ctx.fillStyle = '#4a3a6a';
  ctx.fillRect(0, gy, canvas.width, 3);

  // Ground texture lines
  ctx.strokeStyle = 'rgba(100, 80, 150, 0.2)';
  ctx.lineWidth = 1;
  for (let x = -groundOffset; x < canvas.width + 24; x += 24) {
    ctx.beginPath();
    ctx.moveTo(x, gy + 10);
    ctx.lineTo(x + 12, gy + 25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 12, gy + 10);
    ctx.lineTo(x, gy + 25);
    ctx.stroke();
  }

  // Little grass-like tufts
  ctx.fillStyle = '#5a4a7a';
  for (let x = -groundOffset; x < canvas.width + 24; x += 18) {
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.lineTo(x + 4, gy - 5);
    ctx.lineTo(x + 8, gy);
    ctx.fill();
  }
}

function drawPipe(pipe) {
  const w = pipe.width;
  const capH = 20;
  const capOverhang = 5;
  const r = 4;

  // --- Top pipe body ---
  const topGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + w, 0);
  topGrad.addColorStop(0, '#1a5c2a');
  topGrad.addColorStop(0.2, '#2a8c3a');
  topGrad.addColorStop(0.5, '#32a842');
  topGrad.addColorStop(0.8, '#2a8c3a');
  topGrad.addColorStop(1, '#1a5c2a');
  ctx.fillStyle = topGrad;
  ctx.fillRect(pipe.x, 0, w, pipe.topHeight - capH);

  // Top pipe cap (rounded)
  const capX = pipe.x - capOverhang;
  const capW = w + capOverhang * 2;
  const capY = pipe.topHeight - capH;
  ctx.fillStyle = topGrad;
  ctx.beginPath();
  ctx.roundRect(capX, capY, capW, capH, [r, r, 0, 0]);
  ctx.fill();

  // Cap highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(capX + 3, capY + 2, capW * 0.3, capH - 4);

  // Cap dark edge
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(capX + capW - capW * 0.2, capY + 2, capW * 0.15, capH - 4);

  // Pipe body highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(pipe.x + 4, 0, w * 0.2, pipe.topHeight - capH);

  // --- Bottom pipe body ---
  const botGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + w, 0);
  botGrad.addColorStop(0, '#1a5c2a');
  botGrad.addColorStop(0.2, '#2a8c3a');
  botGrad.addColorStop(0.5, '#32a842');
  botGrad.addColorStop(0.8, '#2a8c3a');
  botGrad.addColorStop(1, '#1a5c2a');
  ctx.fillStyle = botGrad;
  ctx.fillRect(pipe.x, pipe.bottomY + capH, w, canvas.height - pipe.bottomY - capH - GROUND_HEIGHT);

  // Bottom pipe cap
  ctx.fillStyle = botGrad;
  ctx.beginPath();
  ctx.roundRect(capX, pipe.bottomY, capW, capH, [0, 0, r, r]);
  ctx.fill();

  // Bottom cap highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(capX + 3, pipe.bottomY + 2, capW * 0.3, capH - 4);

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(capX + capW - capW * 0.2, pipe.bottomY + 2, capW * 0.15, capH - 4);

  // Bottom body highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(pipe.x + 4, pipe.bottomY + capH, w * 0.2, canvas.height - pipe.bottomY - capH - GROUND_HEIGHT);
}

function drawBird() {
  const s = CONFIG.birdSize;
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);

  // Body (rounded ellipse with gradient)
  const bodyGrad = ctx.createRadialGradient(0, -2, s * 0.1, 0, 0, s * 0.55);
  bodyGrad.addColorStop(0, '#ffe066');
  bodyGrad.addColorStop(0.6, '#f0c030');
  bodyGrad.addColorStop(1, '#d4a020');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.52, s * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#a07818';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Belly
  ctx.fillStyle = '#fff5cc';
  ctx.beginPath();
  ctx.ellipse(2, 4, s * 0.3, s * 0.22, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.save();
  ctx.translate(-4, 2);
  ctx.rotate(bird.wingAngle);
  const wingGrad = ctx.createLinearGradient(0, 0, 0, s * 0.4);
  wingGrad.addColorStop(0, '#e0a828');
  wingGrad.addColorStop(1, '#c89020');
  ctx.fillStyle = wingGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.28, s * 0.2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#a07818';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Eye (white)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.18, -s * 0.12, s * 0.16, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pupil
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(s * 0.22, -s * 0.12, s * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlight
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.25, -s * 0.17, s * 0.04, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e85030';
  ctx.beginPath();
  ctx.moveTo(s * 0.4, -s * 0.02);
  ctx.lineTo(s * 0.65, s * 0.06);
  ctx.lineTo(s * 0.4, s * 0.14);
  ctx.closePath();
  ctx.fill();

  // Beak top
  ctx.fillStyle = '#f06040';
  ctx.beginPath();
  ctx.moveTo(s * 0.4, -s * 0.02);
  ctx.lineTo(s * 0.65, s * 0.06);
  ctx.lineTo(s * 0.4, s * 0.06);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const p of deathParticles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawScore() {
  if (gameState !== STATE.PLAYING) return;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 52px "Segoe UI", system-ui, sans-serif';

  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
  ctx.fillText(score, canvas.width / 2 + 2, 52);

  // White stroke
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.lineWidth = 4;
  ctx.strokeText(score, canvas.width / 2, 50);

  // Main text
  ctx.fillStyle = '#fff';
  ctx.fillText(score, canvas.width / 2, 50);
  ctx.restore();
}

function getMedalInfo(s) {
  if (s >= 100) return { name: 'PLATINUM', color1: '#e0e8f0', color2: '#90a0b0', color3: '#c0d0e0', icon: '#a0b8d0' };
  if (s >= 50) return { name: 'GOLD', color1: '#ffd700', color2: '#b8860b', color3: '#ffe44d', icon: '#f0c030' };
  if (s >= 25) return { name: 'SILVER', color1: '#c0c0c0', color2: '#808080', color3: '#d8d8d8', icon: '#b0b0b0' };
  if (s >= 10) return { name: 'BRONZE', color1: '#cd7f32', color2: '#8b4513', color3: '#daa060', icon: '#c08030' };
  return null;
}

function drawMedal(cx, cy, radius, medal) {
  // Medal circle background
  const mGrad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius);
  mGrad.addColorStop(0, medal.color3);
  mGrad.addColorStop(0.7, medal.color1);
  mGrad.addColorStop(1, medal.color2);
  ctx.fillStyle = mGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Medal border
  ctx.strokeStyle = medal.color2;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Star icon
  ctx.fillStyle = medal.icon;
  ctx.font = `bold ${radius}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u2605', cx, cy + 1);

  // Medal name below
  ctx.font = `bold 10px "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = medal.color1;
  ctx.fillText(medal.name, cx, cy + radius + 14);
}

function drawStartScreen() {
  ctx.save();
  ctx.textAlign = 'center';

  // Title
  const titleY = canvas.height * 0.2;
  ctx.font = 'bold 42px "Segoe UI", system-ui, sans-serif';

  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('Flappy Bird', canvas.width / 2 + 2, titleY + 2);

  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 5;
  ctx.strokeText('Flappy Bird', canvas.width / 2, titleY);

  // Title gradient fill
  const titleGrad = ctx.createLinearGradient(0, titleY - 20, 0, titleY + 20);
  titleGrad.addColorStop(0, '#ffe066');
  titleGrad.addColorStop(1, '#f0a030');
  ctx.fillStyle = titleGrad;
  ctx.fillText('Flappy Bird', canvas.width / 2, titleY);

  // Tap to start (pulsing)
  const pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = '22px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#c0b0e0';
  ctx.fillText('Tap to Start', canvas.width / 2, canvas.height * 0.65);
  ctx.globalAlpha = 1;

  // Best score
  if (bestScore > 0) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200, 180, 240, 0.7)';
    ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, canvas.height * 0.72);
  }

  ctx.restore();
}

function drawGameOverScreen() {
  const progress = Math.min(gameOverTimer / 20, 1);
  const ease = 1 - Math.pow(1 - progress, 3); // ease-out cubic

  ctx.save();

  // Dim overlay
  ctx.fillStyle = `rgba(0, 0, 0, ${0.4 * ease})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Panel slide in
  const panelW = Math.min(canvas.width * 0.8, 300);
  const panelH = 260;
  const panelX = (canvas.width - panelW) / 2;
  const panelY = canvas.height * 0.22 + (1 - ease) * -80;

  // Panel background
  ctx.fillStyle = 'rgba(20, 15, 40, 0.92)';
  ctx.beginPath();
  ctx.roundRect(panelX, panelY, panelW, panelH, 16);
  ctx.fill();

  // Panel border
  ctx.strokeStyle = 'rgba(150, 120, 220, 0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.textAlign = 'center';

  // "Game Over" title
  ctx.font = 'bold 30px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ff6060';
  ctx.fillText('Game Over', canvas.width / 2, panelY + 42);

  // Score
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#a090c0';
  ctx.fillText('Score', canvas.width / 2, panelY + 75);

  ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(score, canvas.width / 2, panelY + 115);

  // Best score
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#8070a0';
  ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, panelY + 145);

  // Medal
  const medal = getMedalInfo(score);
  if (medal) {
    drawMedal(canvas.width / 2, panelY + 193, 22, medal);
  }

  // Tap to retry (appears after delay)
  if (gameOverTimer > 30) {
    const retryPulse = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = retryPulse;
    ctx.font = '20px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#c0b0e0';
    ctx.fillText('Tap to Retry', canvas.width / 2, panelY + panelH + 40);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const dx = (Math.random() - 0.5) * shakeIntensity;
    const dy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(dx, dy);
    shakeIntensity *= 0.85;
  }

  // Background
  drawSkyGradient();
  drawStars();
  drawClouds(farClouds, 0.06);
  drawClouds(nearClouds, 0.1);

  // Pipes
  for (const pipe of pipes) {
    drawPipe(pipe);
  }

  // Ground
  drawGround();

  // Particles (behind bird)
  drawParticles();

  // Bird
  drawBird();

  // Score
  drawScore();

  ctx.restore();

  // Flash effect (not affected by shake)
  drawFlash();

  // UI Overlays
  if (gameState === STATE.IDLE) drawStartScreen();
  if (gameState === STATE.DEAD) drawGameOverScreen();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// START
// ============================================================
init();
gameLoop();
</script>
</body>
