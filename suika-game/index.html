<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Suika Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    width: 100%;
  }
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 500px;
    padding: 8px 16px;
    flex-shrink: 0;
  }
  #back-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #e0e0e0;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  #back-btn:hover { background: rgba(255,255,255,0.15); }
  #score-area {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .score-box {
    text-align: center;
  }
  .score-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
  }
  .score-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  #next-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #next-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
  }
  #next-canvas {
    width: 50px;
    height: 50px;
  }
  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 4px;
    min-height: 0;
  }
  #gameCanvas {
    display: block;
    border-radius: 4px;
  }
  #game-over-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #game-over-overlay.show { display: flex; }
  #game-over-overlay h1 {
    font-size: 36px;
    color: #ff4466;
    text-shadow: 0 0 20px rgba(255,68,102,0.5);
  }
  #game-over-overlay .final-score {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
  }
  #game-over-overlay .high-score-msg {
    font-size: 16px;
    color: #ffd700;
  }
  #game-over-overlay .hs-display {
    font-size: 14px;
    color: #aaa;
  }
  #restart-btn {
    margin-top: 12px;
    padding: 14px 48px;
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, #ff4466, #cc2244);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  #restart-btn:hover { transform: scale(1.05); }
  #restart-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="top-bar">
    <a id="back-btn" href="../index.html">&#8592; Back</a>
    <div id="next-preview">
      <span id="next-label">Next</span>
      <canvas id="next-canvas" width="100" height="100"></canvas>
    </div>
    <div id="score-area">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-value" id="high-score-display">0</div>
      </div>
    </div>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
  </div>
</div>

<div id="game-over-overlay">
  <h1>GAME OVER</h1>
  <div class="final-score" id="final-score">0</div>
  <div class="high-score-msg" id="new-high-msg" style="display:none">New High Score!</div>
  <div class="hs-display" id="hs-display">Best: 0</div>
  <button id="restart-btn">Play Again</button>
</div>

<script>
(function() {
  "use strict";

  // ---- FRUIT DEFINITIONS ----
  const FRUITS = [
    { name: "Cherry",      radius: 20,  color: "#e63946", emoji: "\uD83C\uDF52", tier: 1  },
    { name: "Strawberry",   radius: 28,  color: "#ff6b8a", emoji: "\uD83C\uDF53", tier: 2  },
    { name: "Grape",        radius: 36,  color: "#7b2d8e", emoji: "\uD83C\uDF47", tier: 3  },
    { name: "Orange",       radius: 44,  color: "#f77f00", emoji: "\uD83C\uDF4A", tier: 4  },
    { name: "Apple",        radius: 52,  color: "#2d6a4f", emoji: "\uD83C\uDF4E", tier: 5  },
    { name: "Pear",         radius: 60,  color: "#a7c957", emoji: "\uD83C\uDF50", tier: 6  },
    { name: "Peach",        radius: 70,  color: "#ffb5a7", emoji: "\uD83C\uDF51", tier: 7  },
    { name: "Pineapple",    radius: 82,  color: "#ffc300", emoji: "\uD83C\uDF4D", tier: 8  },
    { name: "Melon",        radius: 96,  color: "#52b788", emoji: "\uD83C\uDF48", tier: 9  },
    { name: "Watermelon",   radius: 112, color: "#1b4332", emoji: "\uD83C\uDF49", tier: 10 }
  ];

  // Scale factor for the game world vs pixel sizes above
  // The radii above are "design" radii in game-world units
  // We'll use a fixed game-world width of 400 and scale rendering

  const GAME_W = 400;
  const GAME_H = 600;
  const WALL_THICK = 6;
  const DEAD_LINE_Y = 80;       // y position of the danger line
  const DROP_Y = 40;            // y where fruit appears before drop
  const GRAVITY = 980;
  const DAMPING = 0.35;         // velocity damping on collision/bounce
  const FRICTION = 0.97;        // per-frame friction
  const SUB_STEPS = 8;
  const MAX_DROP_TIER = 5;      // max tier for random drop fruit (0-indexed, so tier 1-5)

  // ---- STATE ----
  let canvas, ctx, nextCanvas, nextCtx;
  let score = 0;
  let highScore = parseInt(localStorage.getItem("suika_highscore")) || 0;
  let fruits = [];
  let particles = [];
  let currentFruitTier = 0;
  let nextFruitTier = 0;
  let dropX = GAME_W / 2;
  let canDrop = true;
  let dropCooldown = 0;
  let gameOver = false;
  let gameOverTimer = 0;
  let scaleRatio = 1;
  let offsetX = 0, offsetY = 0;
  let animFrame = 0;
  let lastTime = 0;
  let pointerDown = false;

  // ---- INIT ----
  function init() {
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");
    nextCanvas = document.getElementById("next-canvas");
    nextCtx = nextCanvas.getContext("2d");

    document.getElementById("high-score-display").textContent = highScore;

    resize();
    window.addEventListener("resize", resize);

    // Input
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);

    document.getElementById("restart-btn").addEventListener("click", restart);

    resetGame();
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function resize() {
    const container = document.getElementById("canvas-container");
    const cw = container.clientWidth - 8;
    const ch = container.clientHeight - 8;
    const aspect = GAME_W / GAME_H;
    let w, h;
    if (cw / ch > aspect) {
      h = ch;
      w = h * aspect;
    } else {
      w = cw;
      h = w / aspect;
    }
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    scaleRatio = w / GAME_W;
    offsetX = 0;
    offsetY = 0;
  }

  function resetGame() {
    fruits = [];
    particles = [];
    score = 0;
    gameOver = false;
    gameOverTimer = 0;
    canDrop = true;
    dropCooldown = 0;
    dropX = GAME_W / 2;
    currentFruitTier = randomDropTier();
    nextFruitTier = randomDropTier();
    document.getElementById("score-display").textContent = "0";
    document.getElementById("game-over-overlay").classList.remove("show");
    drawNextPreview();
  }

  function restart() {
    resetGame();
  }

  function randomDropTier() {
    // Weighted: smaller fruits more common
    const weights = [30, 25, 20, 15, 10];
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) return i;
    }
    return 0;
  }

  // ---- INPUT ----
  function canvasToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) / scaleRatio;
    const y = (clientY - rect.top) / scaleRatio;
    return { x, y };
  }

  function onPointerDown(e) {
    e.preventDefault();
    pointerDown = true;
    const pos = canvasToGame(e.clientX, e.clientY);
    dropX = clampDropX(pos.x, currentFruitTier);
  }

  function onPointerMove(e) {
    e.preventDefault();
    if (!pointerDown && !matchMedia("(hover: none)").matches) {
      const pos = canvasToGame(e.clientX, e.clientY);
      dropX = clampDropX(pos.x, currentFruitTier);
    }
    if (pointerDown) {
      const pos = canvasToGame(e.clientX, e.clientY);
      dropX = clampDropX(pos.x, currentFruitTier);
    }
  }

  function onPointerUp(e) {
    e.preventDefault();
    if (!pointerDown) return;
    pointerDown = false;
    if (canDrop && !gameOver) {
      dropFruit();
    }
  }

  function clampDropX(x, tier) {
    const r = FRUITS[tier].radius;
    return Math.max(WALL_THICK + r, Math.min(GAME_W - WALL_THICK - r, x));
  }

  function dropFruit() {
    if (!canDrop) return;
    const f = createFruit(currentFruitTier, dropX, DROP_Y);
    f.dropped = true;
    fruits.push(f);
    canDrop = false;
    dropCooldown = 0.45; // seconds before next drop

    currentFruitTier = nextFruitTier;
    nextFruitTier = randomDropTier();
    drawNextPreview();
  }

  // ---- FRUIT OBJECT ----
  function createFruit(tier, x, y) {
    return {
      tier: tier,
      x: x,
      y: y,
      vx: 0,
      vy: 0,
      radius: FRUITS[tier].radius,
      color: FRUITS[tier].color,
      emoji: FRUITS[tier].emoji,
      merged: false,
      dropped: false,
      age: 0,
      spawnScale: 0
    };
  }

  // ---- PARTICLES ----
  function spawnMergeParticles(x, y, color, radius) {
    const count = 12 + Math.floor(radius / 8);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = 80 + Math.random() * 200;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.4 + Math.random() * 0.3,
        radius: 2 + Math.random() * 4,
        color: color
      });
    }
    // Ring particle
    particles.push({
      x: x, y: y, vx: 0, vy: 0,
      life: 0.3, maxLife: 0.3,
      radius: radius,
      color: color,
      ring: true
    });
  }

  // ---- PHYSICS ----
  function update(dt) {
    if (gameOver) return;

    // Drop cooldown
    if (!canDrop) {
      dropCooldown -= dt;
      if (dropCooldown <= 0) {
        canDrop = true;
      }
    }

    const subDt = dt / SUB_STEPS;

    for (let step = 0; step < SUB_STEPS; step++) {
      // Apply gravity and move
      for (let i = 0; i < fruits.length; i++) {
        const f = fruits[i];
        if (f.merged) continue;
        f.age += subDt;
        if (f.spawnScale < 1) {
          f.spawnScale = Math.min(1, f.spawnScale + subDt * 6);
        }
        f.vy += GRAVITY * subDt;
        f.vx *= Math.pow(FRICTION, subDt * 60);
        f.vy *= Math.pow(FRICTION, subDt * 60);
        f.x += f.vx * subDt;
        f.y += f.vy * subDt;
      }

      // Wall collisions
      for (let i = 0; i < fruits.length; i++) {
        const f = fruits[i];
        if (f.merged) continue;
        const r = f.radius;
        // Left wall
        if (f.x - r < WALL_THICK) {
          f.x = WALL_THICK + r;
          f.vx = Math.abs(f.vx) * DAMPING;
        }
        // Right wall
        if (f.x + r > GAME_W - WALL_THICK) {
          f.x = GAME_W - WALL_THICK - r;
          f.vx = -Math.abs(f.vx) * DAMPING;
        }
        // Bottom
        if (f.y + r > GAME_H - WALL_THICK) {
          f.y = GAME_H - WALL_THICK - r;
          f.vy = -Math.abs(f.vy) * DAMPING;
          if (Math.abs(f.vy) < 10) f.vy = 0;
        }
      }

      // Fruit-fruit collisions
      for (let i = 0; i < fruits.length; i++) {
        const a = fruits[i];
        if (a.merged) continue;
        for (let j = i + 1; j < fruits.length; j++) {
          const b = fruits[j];
          if (b.merged) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.radius + b.radius;

          if (dist < minDist && dist > 0.01) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;

            // Separate
            const totalMass = a.radius + b.radius;
            const ratioA = b.radius / totalMass;
            const ratioB = a.radius / totalMass;
            a.x -= nx * overlap * ratioA;
            a.y -= ny * overlap * ratioA;
            b.x += nx * overlap * ratioB;
            b.y += ny * overlap * ratioB;

            // Relative velocity along collision normal
            const dvx = a.vx - b.vx;
            const dvy = a.vy - b.vy;
            const dvn = dvx * nx + dvy * ny;

            if (dvn > 0) {
              // Impulse with restitution
              const restitution = 0.3;
              const impulse = dvn * (1 + restitution) / 2;
              a.vx -= impulse * nx * ratioA * 2;
              a.vy -= impulse * ny * ratioA * 2;
              b.vx += impulse * nx * ratioB * 2;
              b.vy += impulse * ny * ratioB * 2;
            }

            // Merge check
            if (a.tier === b.tier && a.tier < FRUITS.length - 1) {
              mergeFruits(a, b);
            }
          }
        }
      }
    }

    // Remove merged fruits
    fruits = fruits.filter(f => !f.merged);

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      if (!p.ring) {
        p.vy += 300 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      }
    }

    // Game over check: any non-moving fruit above deadline for >1.5 seconds
    checkGameOver(dt);
  }

  function mergeFruits(a, b) {
    const newTier = a.tier + 1;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    a.merged = true;
    b.merged = true;

    const newFruit = createFruit(newTier, mx, my);
    newFruit.vx = (a.vx + b.vx) / 2;
    newFruit.vy = (a.vy + b.vy) * 0.3;
    newFruit.dropped = true;
    newFruit.spawnScale = 0.3;
    fruits.push(newFruit);

    // Score
    score += FRUITS[newTier].tier;
    document.getElementById("score-display").textContent = score;

    // Particles
    spawnMergeParticles(mx, my, FRUITS[newTier].color, FRUITS[newTier].radius);
  }

  function checkGameOver(dt) {
    let aboveLine = false;
    for (let i = 0; i < fruits.length; i++) {
      const f = fruits[i];
      if (f.merged) continue;
      if (f.age < 1.0) continue; // grace period after drop
      if (f.y - f.radius < DEAD_LINE_Y) {
        // Check if roughly settled (low velocity)
        const speed = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
        if (speed < 150) {
          aboveLine = true;
          break;
        }
      }
    }

    if (aboveLine) {
      gameOverTimer += dt;
      if (gameOverTimer > 1.0) {
        triggerGameOver();
      }
    } else {
      gameOverTimer = Math.max(0, gameOverTimer - dt * 2);
    }
  }

  function triggerGameOver() {
    gameOver = true;
    let isNewHigh = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("suika_highscore", highScore);
      document.getElementById("high-score-display").textContent = highScore;
      isNewHigh = true;
    }
    document.getElementById("final-score").textContent = score;
    document.getElementById("hs-display").textContent = "Best: " + highScore;
    document.getElementById("new-high-msg").style.display = isNewHigh ? "block" : "none";
    document.getElementById("game-over-overlay").classList.add("show");
  }

  // ---- RENDERING ----
  function draw() {
    const dpr = canvas.width / (GAME_W * scaleRatio) || 1;
    ctx.setTransform(dpr * scaleRatio, 0, 0, dpr * scaleRatio, 0, 0);
    ctx.clearRect(0, 0, GAME_W, GAME_H);

    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
    bgGrad.addColorStop(0, "#0f0f2a");
    bgGrad.addColorStop(1, "#0a0a1a");
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    // Container walls
    ctx.fillStyle = "#1a1a3a";
    // Left wall
    ctx.fillRect(0, DEAD_LINE_Y - 10, WALL_THICK, GAME_H - DEAD_LINE_Y + 10);
    // Right wall
    ctx.fillRect(GAME_W - WALL_THICK, DEAD_LINE_Y - 10, WALL_THICK, GAME_H - DEAD_LINE_Y + 10);
    // Bottom
    ctx.fillRect(0, GAME_H - WALL_THICK, GAME_W, WALL_THICK);

    // Wall borders
    ctx.strokeStyle = "#2a2a5a";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(WALL_THICK, DEAD_LINE_Y - 10);
    ctx.lineTo(WALL_THICK, GAME_H - WALL_THICK);
    ctx.lineTo(GAME_W - WALL_THICK, GAME_H - WALL_THICK);
    ctx.lineTo(GAME_W - WALL_THICK, DEAD_LINE_Y - 10);
    ctx.stroke();

    // Dead line
    ctx.setLineDash([8, 6]);
    ctx.strokeStyle = "rgba(255, 60, 80, 0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(WALL_THICK, DEAD_LINE_Y);
    ctx.lineTo(GAME_W - WALL_THICK, DEAD_LINE_Y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Drop guide line
    if (canDrop && !gameOver) {
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(dropX, DROP_Y + FRUITS[currentFruitTier].radius);
      ctx.lineTo(dropX, GAME_H - WALL_THICK);
      ctx.stroke();
      ctx.setLineDash([]);

      // Current fruit preview at drop position
      drawFruit(dropX, DROP_Y, currentFruitTier, 0.6, 1);
    }

    // Fruits
    for (let i = 0; i < fruits.length; i++) {
      const f = fruits[i];
      if (f.merged) continue;
      drawFruit(f.x, f.y, f.tier, 1, f.spawnScale);
    }

    // Particles
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const alpha = p.life / p.maxLife;
      if (p.ring) {
        const expand = 1 + (1 - alpha) * 1.5;
        ctx.strokeStyle = hexToRgba(p.color, alpha * 0.6);
        ctx.lineWidth = 3 * alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * expand, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // Game over warning flash
    if (gameOverTimer > 0 && !gameOver) {
      const flash = Math.sin(gameOverTimer * 10) * 0.15 + 0.15;
      ctx.fillStyle = `rgba(255, 40, 60, ${flash})`;
      ctx.fillRect(WALL_THICK, DEAD_LINE_Y - 10, GAME_W - WALL_THICK * 2, 14);
    }
  }

  function drawFruit(x, y, tier, alpha, scale) {
    const def = FRUITS[tier];
    const r = def.radius * scale;
    if (r < 1) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.arc(x + 2, y + 3, r, 0, Math.PI * 2);
    ctx.fill();

    // Main circle with gradient
    const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
    grad.addColorStop(0, lightenColor(def.color, 40));
    grad.addColorStop(0.7, def.color);
    grad.addColorStop(1, darkenColor(def.color, 30));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // Shine highlight
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.beginPath();
    ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.45, 0, Math.PI * 2);
    ctx.fill();

    // Emoji
    const fontSize = Math.max(10, r * 0.9);
    ctx.font = `${fontSize}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(def.emoji, x, y + 1);

    ctx.restore();
  }

  function drawNextPreview() {
    const dpr = 2;
    const size = 50;
    nextCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    nextCtx.clearRect(0, 0, size, size);

    const def = FRUITS[nextFruitTier];
    const maxR = 20;
    const r = Math.min(def.radius, maxR);
    const cx = size / 2, cy = size / 2;

    // Mini fruit
    const grad = nextCtx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
    grad.addColorStop(0, lightenColor(def.color, 40));
    grad.addColorStop(0.7, def.color);
    grad.addColorStop(1, darkenColor(def.color, 30));
    nextCtx.fillStyle = grad;
    nextCtx.beginPath();
    nextCtx.arc(cx, cy, r, 0, Math.PI * 2);
    nextCtx.fill();

    const fontSize = Math.max(8, r * 0.9);
    nextCtx.font = `${fontSize}px sans-serif`;
    nextCtx.textAlign = "center";
    nextCtx.textBaseline = "middle";
    nextCtx.fillText(def.emoji, cx, cy + 1);
  }

  // ---- COLOR UTILS ----
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function lightenColor(hex, amt) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + amt);
    g = Math.min(255, g + amt);
    b = Math.min(255, b + amt);
    return `rgb(${r},${g},${b})`;
  }

  function darkenColor(hex, amt) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    r = Math.max(0, r - amt);
    g = Math.max(0, g - amt);
    b = Math.max(0, b - amt);
    return `rgb(${r},${g},${b})`;
  }

  // ---- GAME LOOP ----
  function loop(now) {
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 1 / 30); // cap

    update(dt);
    draw();
    animFrame = requestAnimationFrame(loop);
  }

  // ---- START ----
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
