<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎑 Mid-Autumn Slot Machine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(255,140,0,0.15) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* Floating lantern decorations */
    .lantern-deco {
      position: fixed;
      font-size: 2rem;
      animation: lanternFloat linear infinite;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }
    .lantern-deco:nth-child(1) { left: 5%;  animation-duration: 12s; animation-delay: 0s;   font-size: 2.2rem; }
    .lantern-deco:nth-child(2) { left: 15%; animation-duration: 15s; animation-delay: -4s;  font-size: 1.8rem; }
    .lantern-deco:nth-child(3) { left: 80%; animation-duration: 11s; animation-delay: -2s;  font-size: 2.4rem; }
    .lantern-deco:nth-child(4) { left: 90%; animation-duration: 14s; animation-delay: -7s;  font-size: 1.9rem; }
    .lantern-deco:nth-child(5) { left: 50%; animation-duration: 13s; animation-delay: -5s;  font-size: 2.0rem; }
    .lantern-deco:nth-child(6) { left: 70%; animation-duration: 16s; animation-delay: -9s;  font-size: 2.1rem; }

    @keyframes lanternFloat {
      0%   { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
      5%   { opacity: 0.6; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-10vh) rotate(5deg); opacity: 0; }
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(255,140,0,0.15);
      border: 1px solid rgba(255,140,0,0.4);
      color: #ffd700;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      z-index: 100;
    }
    .back-btn:hover {
      background: rgba(255,140,0,0.3);
      border-color: #ffd700;
      color: #fff;
      transform: translateX(-2px);
    }

    /* Header */
    .game-header {
      text-align: center;
      padding: 30px 20px 10px;
      position: relative;
      z-index: 1;
    }
    .game-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleShimmer 3s linear infinite;
      letter-spacing: 2px;
      text-shadow: none;
    }
    @keyframes titleShimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .game-subtitle {
      color: rgba(255,215,0,0.6);
      font-size: 0.85rem;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Credits bar */
    .credits-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 14px auto;
      background: rgba(255,140,0,0.08);
      border: 1px solid rgba(255,140,0,0.25);
      border-radius: 50px;
      padding: 10px 28px;
      max-width: 400px;
      width: 90%;
      position: relative;
      z-index: 1;
    }
    .credits-label {
      font-size: 0.8rem;
      color: rgba(255,215,0,0.7);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .credits-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      transition: transform 0.2s;
    }
    .credits-value.bump {
      animation: creditBump 0.3s ease;
    }
    @keyframes creditBump {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }
    .spin-cost-label {
      font-size: 0.75rem;
      color: rgba(255,165,0,0.6);
    }

    /* Machine wrapper */
    .machine-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 520px;
      padding: 0 10px;
    }

    /* Jackpot banner */
    .jackpot-banner {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 900;
      color: #ffd700;
      text-align: center;
      letter-spacing: 3px;
      padding: 8px 24px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,140,0,0.2), rgba(255,215,0,0.2));
      border: 1px solid rgba(255,215,0,0.3);
      margin-bottom: 10px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .jackpot-banner::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent);
      animation: bannerShine 3s linear infinite;
    }
    @keyframes bannerShine {
      0%   { left: -100%; }
      100% { left: 200%; }
    }

    /* Lights row */
    .lights-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      width: 100%;
    }
    .light-bulb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #222;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .light-bulb.on-amber { background: #ff8c00; box-shadow: 0 0 6px #ff8c00; }
    .light-bulb.on-gold  { background: #ffd700; box-shadow: 0 0 6px #ffd700; }
    .light-bulb.on-red   { background: #ff4500; box-shadow: 0 0 6px #ff4500; }

    /* Machine cabinet */
    .machine-cabinet {
      background: linear-gradient(180deg, #1a0a00 0%, #0d0500 100%);
      border: 2px solid rgba(255,140,0,0.3);
      border-radius: 20px;
      padding: 16px;
      width: 100%;
      box-shadow: 0 0 40px rgba(255,140,0,0.1), inset 0 0 30px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Reels area */
    .reels-section {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: stretch;
      margin-bottom: 12px;
    }

    .reel-container {
      flex: 1;
      max-width: 130px;
      position: relative;
    }

    /* Win line */
    .win-line {
      position: absolute;
      left: -4px; right: -4px;
      top: 50%;
      transform: translateY(-50%);
      height: calc(var(--symbol-height, 80px) + 6px);
      border: 2px solid transparent;
      border-radius: 8px;
      pointer-events: none;
      z-index: 5;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .win-line.active {
      border-color: #ff8c00;
      box-shadow: 0 0 12px rgba(255,140,0,0.7), 0 0 24px rgba(255,140,0,0.3), inset 0 0 8px rgba(255,140,0,0.1);
    }

    .reel-window {
      height: calc(var(--symbol-height, 80px) * 3);
      overflow: hidden;
      border-radius: 10px;
      background: #0a0600;
      border: 1px solid rgba(255,140,0,0.2);
      position: relative;
    }
    .reel-window::before,
    .reel-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 30%;
      z-index: 3;
      pointer-events: none;
    }
    .reel-window::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(10,6,0,0.7), transparent);
    }
    .reel-window::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(10,6,0,0.7), transparent);
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .reel-symbol {
      width: 100%;
      height: var(--symbol-height, 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      flex-shrink: 0;
      transition: transform 0.1s;
    }

    /* Reel spinning state */
    .reel-window.spinning .reel-strip .reel-symbol {
      filter: blur(1px);
    }
    .reel-window.stopping .reel-strip .reel-symbol {
      filter: blur(0.3px);
    }

    /* Result display */
    .result-display {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }
    .result-text {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      text-align: center;
      padding: 10px 20px;
      border-radius: 30px;
      opacity: 0;
      transform: scale(0.8) translateY(10px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .result-text.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .result-text.win {
      background: linear-gradient(135deg, rgba(255,140,0,0.2), rgba(255,215,0,0.2));
      border: 1px solid rgba(255,215,0,0.5);
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }
    .result-text.double {
      background: linear-gradient(135deg, rgba(255,140,0,0.15), rgba(255,165,0,0.15));
      border: 1px solid rgba(255,165,0,0.4);
      color: #ffa500;
    }
    .result-text.lose {
      background: rgba(255,60,0,0.1);
      border: 1px solid rgba(255,60,0,0.2);
      color: rgba(255,150,100,0.8);
    }

    /* Spin button */
    .spin-btn {
      width: 100%;
      padding: 16px;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff8c00, #ffd700);
      color: #1a0500;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(170,85,0,0.5), 0 2px 0 #aa5500;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      position: relative;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .spin-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      animation: btnShine 3s linear infinite;
    }
    @keyframes btnShine {
      0%   { left: -100%; }
      100% { left: 200%; }
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(170,85,0,0.6), 0 2px 0 #aa5500;
    }
    .spin-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 3px 12px rgba(170,85,0,0.4), 0 1px 0 #aa5500;
    }
    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Payout table */
    .payout-section {
      width: 100%;
      max-width: 520px;
      margin: 16px auto 0;
      padding: 0 10px;
      position: relative;
      z-index: 1;
    }
    .payout-title {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .payout-table {
      background: rgba(255,140,0,0.06);
      border: 1px solid rgba(255,140,0,0.2);
      border-radius: 12px;
      overflow: hidden;
      font-size: 0.8rem;
    }
    .payout-row {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,140,0,0.1);
      gap: 10px;
    }
    .payout-row:last-child { border-bottom: none; }
    .payout-symbols {
      font-size: 1.1rem;
      min-width: 70px;
      letter-spacing: 2px;
    }
    .payout-desc {
      flex: 1;
      color: rgba(255,200,100,0.8);
    }
    .payout-pts {
      color: #ffd700;
      font-weight: 700;
      min-width: 50px;
      text-align: right;
    }

    /* Coin rain */
    .coin-rain-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .coin {
      position: absolute;
      top: -50px;
      font-size: 1.4rem;
      animation: coinFall linear forwards;
      pointer-events: none;
    }
    @keyframes coinFall {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      animation: sparkleAnim 0.8s ease forwards;
    }
    @keyframes sparkleAnim {
      0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
      60%  { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }

    /* Win overlay flash */
    .win-flash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(255,140,0,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 9990;
      animation: winFlashAnim 0.6s ease forwards;
    }
    @keyframes winFlashAnim {
      0%   { opacity: 0; }
      30%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .machine-cabinet { padding: 10px; }
      .reels-section { gap: 5px; }
      .reel-symbol { font-size: 1.6rem; }
    }
    @media (max-width: 360px) {
      .reel-symbol { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- Floating lantern decorations -->
  <div class="lantern-deco">🏮</div>
  <div class="lantern-deco">🏮</div>
  <div class="lantern-deco">🏮</div>
  <div class="lantern-deco">🏮</div>
  <div class="lantern-deco">🏮</div>
  <div class="lantern-deco">🏮</div>

  <!-- Back button -->
  <a href="../index.html" class="back-btn">← Back</a>

  <!-- Coin rain container -->
  <div class="coin-rain-container" id="coinRain"></div>

  <!-- Header -->
  <div class="game-header">
    <h1 class="game-title">🎑 Mid-Autumn Slot Machine</h1>
    <p class="game-subtitle">Spin for Festival Prizes!</p>
  </div>

  <!-- Credits bar -->
  <div class="credits-bar">
    <span class="credits-label">Festival Points</span>
    <span class="credits-value" id="creditsDisplay">100</span>
    <span class="spin-cost-label">Cost: 10 points per spin</span>
  </div>

  <!-- Machine wrapper -->
  <div class="machine-wrapper">

    <!-- Jackpot banner -->
    <div class="jackpot-banner">🌕 JACKPOT!</div>

    <!-- Top lights -->
    <div class="lights-row" id="topLights"></div>

    <!-- Machine cabinet -->
    <div class="machine-cabinet">

      <!-- Reels section -->
      <div class="reels-section" id="reelsSection">
        <!-- Reels built by JS -->
      </div>

      <!-- Result display -->
      <div class="result-display">
        <div class="result-text" id="resultText">Spin to win Festival Prizes!</div>
      </div>

      <!-- Spin button -->
      <button class="spin-btn" id="spinBtn">SPIN</button>
      <div style="text-align:center; font-size:0.75rem; color:rgba(255,165,0,0.5); margin-top:2px;">Cost: 10 points per spin</div>

    </div>

    <!-- Bottom lights -->
    <div class="lights-row" id="botLights"></div>

  </div>

  <!-- Payout table -->
  <div class="payout-section">
    <div class="payout-title">Prize Table 🥮</div>
    <div class="payout-table" id="payoutTable"></div>
  </div>

  <script>
    // ======================= CONSTANTS =======================
    const SPIN_COST       = 10;
    const INITIAL_CREDITS = 100;
    const REEL_EXTRA      = 30;
    const VISIBLE_ROWS    = 3;
    const NUM_REELS       = 3;

    const SYMBOLS = ['🥮','🏮','🌕','🍊','🌟','🎑','🐰','🌙'];

    const PAYOUTS = {
      '🌕': {
        triple: 'Moon Grand Prize! 🎊',
        double: 'Moon Voucher 50K',
        tripleCredits: 1000,
        doubleCredits: 50,
      },
      '🥮': {
        triple: 'Mooncake Gift Set! 🎁',
        double: 'Mooncake Box',
        tripleCredits: 500,
        doubleCredits: 100,
      },
      '🌟': {
        triple: 'Star Festival Prize!',
        double: '+30 Star Points',
        tripleCredits: 300,
        doubleCredits: 30,
      },
      '🏮': {
        triple: 'Lantern Gift 100pts',
        double: '+20 Lantern Pts',
        tripleCredits: 100,
        doubleCredits: 20,
      },
      'default': {
        triple: 'Festival Gift!',
        double: '+10 Points',
        tripleCredits: 50,
        doubleCredits: 10,
      },
    };

    const SYMBOL_WEIGHTS = {
      '🥮': 12, '🏮': 12, '🍊': 15, '🌙': 12,
      '🌟': 10, '🎑': 12, '🐰': 12, '🌕': 5,
    };

    const COIN_EMOJIS = ['🥮','🏮','🌟','✨'];

    // ======================= STATE =======================
    let credits  = INITIAL_CREDITS;
    let spinning = false;
    let lightInterval = null;

    // ======================= DOM REFS =======================
    const creditsDisplay = document.getElementById('creditsDisplay');
    const spinBtn        = document.getElementById('spinBtn');
    const resultEl       = document.getElementById('resultText');
    const reelsSection   = document.getElementById('reelsSection');
    const coinRainEl     = document.getElementById('coinRain');
    const topLightsEl    = document.getElementById('topLights');
    const botLightsEl    = document.getElementById('botLights');
    const payoutTableEl  = document.getElementById('payoutTable');

    // Computed symbol height based on window
    let symbolHeight = 80;
    function computeSymbolHeight() {
      const vw = window.innerWidth;
      if (vw <= 360) symbolHeight = 60;
      else if (vw <= 480) symbolHeight = 70;
      else symbolHeight = 80;
      document.documentElement.style.setProperty('--symbol-height', symbolHeight + 'px');
    }
    computeSymbolHeight();
    window.addEventListener('resize', computeSymbolHeight);

    // Reel DOM elements
    const reelWindows = [];
    const strips      = [];
    let   winLine     = null;

    // ======================= WEIGHTED RANDOM =======================
    function randomSymbol() {
      const pool = [];
      for (const [sym, w] of Object.entries(SYMBOL_WEIGHTS)) {
        for (let i = 0; i < w; i++) pool.push(sym);
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // ======================= BUILD REELS =======================
    function buildReels() {
      reelsSection.innerHTML = '';
      reelWindows.length = 0;
      strips.length = 0;

      for (let r = 0; r < NUM_REELS; r++) {
        const container = document.createElement('div');
        container.className = 'reel-container';

        const wl = document.createElement('div');
        wl.className = 'win-line';
        wl.id = 'winLine' + r;
        container.appendChild(wl);
        if (r === 0) winLine = wl; // reference first; we'll manage all 3

        const win = document.createElement('div');
        win.className = 'reel-window';
        win.id = 'reelWindow' + r;

        const strip = document.createElement('div');
        strip.className = 'reel-strip';
        strip.id = 'reelStrip' + r;

        // Initial symbols
        for (let s = 0; s < VISIBLE_ROWS + 2; s++) {
          const sym = document.createElement('div');
          sym.className = 'reel-symbol';
          sym.textContent = randomSymbol();
          strip.appendChild(sym);
        }

        win.appendChild(strip);
        container.appendChild(win);
        reelsSection.appendChild(container);
        reelWindows.push(win);
        strips.push(strip);
      }

      // Win line spans all reels — use absolute positioned overlay
      winLine = document.createElement('div');
      winLine.id = 'winLineGlobal';
      winLine.style.cssText = `
        position: absolute;
        left: 0; right: 0;
        top: 50%;
        transform: translateY(-50%);
        height: ${symbolHeight + 6}px;
        border: 2px solid transparent;
        border-radius: 8px;
        pointer-events: none;
        z-index: 5;
        transition: border-color 0.3s, box-shadow 0.3s;
      `;
      // Append to machine cabinet
      const cabinet = document.querySelector('.machine-cabinet');
      cabinet.style.position = 'relative';
      // Actually place win line over reels section
      const reelsSectionEl = reelsSection;
      reelsSectionEl.style.position = 'relative';
      reelsSectionEl.appendChild(winLine);
    }

    // ======================= BUILD REEL STRIP for spin =======================
    function buildReelStrip(r) {
      strips[r].innerHTML = '';
      for (let s = 0; s < REEL_EXTRA + VISIBLE_ROWS + 5; s++) {
        const sym = document.createElement('div');
        sym.className = 'reel-symbol';
        sym.textContent = randomSymbol();
        strips[r].appendChild(sym);
      }
      strips[r].style.transform = 'translateY(0px)';
      strips[r].style.transition = 'none';
    }

    // ======================= UPDATE CREDITS =======================
    function updateCredits() {
      creditsDisplay.textContent = credits;
      creditsDisplay.classList.remove('bump');
      void creditsDisplay.offsetWidth;
      creditsDisplay.classList.add('bump');
      creditsDisplay.addEventListener('animationend', () => creditsDisplay.classList.remove('bump'), { once: true });
    }

    // ======================= SHOW RESULT =======================
    function showResult(text, type) {
      resultEl.textContent = text;
      resultEl.className = 'result-text show ' + type;
    }

    // ======================= LIGHTS =======================
    const LIGHT_CLASSES = ['on-amber','on-gold','on-red'];
    function buildLights() {
      const count = 18;
      topLightsEl.innerHTML = '';
      botLightsEl.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const t = document.createElement('div');
        t.className = 'light-bulb';
        topLightsEl.appendChild(t);
        const b = document.createElement('div');
        b.className = 'light-bulb';
        botLightsEl.appendChild(b);
      }
    }

    function startLights(fast) {
      stopLights();
      const topBulbs = topLightsEl.querySelectorAll('.light-bulb');
      const botBulbs = botLightsEl.querySelectorAll('.light-bulb');
      let idx = 0;
      const interval = fast ? 80 : 220;
      lightInterval = setInterval(() => {
        topBulbs.forEach((b, i) => {
          b.className = 'light-bulb';
          if ((i + idx) % 3 === 0) b.classList.add(LIGHT_CLASSES[i % LIGHT_CLASSES.length]);
        });
        botBulbs.forEach((b, i) => {
          b.className = 'light-bulb';
          if ((i + idx + 1) % 3 === 0) b.classList.add(LIGHT_CLASSES[(i + 1) % LIGHT_CLASSES.length]);
        });
        idx++;
      }, interval);
    }

    function stopLights() {
      if (lightInterval) { clearInterval(lightInterval); lightInterval = null; }
      topLightsEl.querySelectorAll('.light-bulb').forEach(b => b.className = 'light-bulb');
      botLightsEl.querySelectorAll('.light-bulb').forEach(b => b.className = 'light-bulb');
    }

    // ======================= SPARKLES =======================
    function spawnSparkle(x, y) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = ['✨','⭐','🌟'][Math.floor(Math.random() * 3)];
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function burstSparkles(count) {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 3;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          spawnSparkle(
            cx + (Math.random() - 0.5) * 400,
            cy + (Math.random() - 0.5) * 300,
          );
        }, Math.random() * 600);
      }
    }

    // ======================= COIN RAIN =======================
    function startCoinRain(duration) {
      const end = Date.now() + duration;
      const interval = setInterval(() => {
        if (Date.now() > end) { clearInterval(interval); return; }
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.textContent = COIN_EMOJIS[Math.floor(Math.random() * COIN_EMOJIS.length)];
        coin.style.left = Math.random() * 100 + 'vw';
        const dur = Math.random() * 1500 + 800;
        coin.style.animationDuration = dur + 'ms';
        coin.style.fontSize = (Math.random() * 0.8 + 1) + 'rem';
        coinRainEl.appendChild(coin);
        coin.addEventListener('animationend', () => coin.remove());
      }, 80);
    }

    // ======================= WIN FLASH =======================
    function winFlash() {
      const el = document.createElement('div');
      el.className = 'win-flash';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ======================= WIN EFFECTS =======================
    function triggerWinEffects(type) {
      if (type === 'triple') {
        winFlash();
        burstSparkles(24);
        startCoinRain(3000);
        startLights(true);
        setTimeout(stopLights, 3000);
      } else if (type === 'double') {
        winFlash();
        burstSparkles(10);
        startCoinRain(1200);
        startLights(false);
        setTimeout(stopLights, 2000);
      } else {
        startLights(false);
        setTimeout(stopLights, 600);
      }
    }

    // ======================= EVALUATE RESULT =======================
    function evaluateResult(finalMid) {
      winLine.style.borderColor   = 'transparent';
      winLine.style.boxShadow     = '';

      const [a, b, c] = finalMid;

      if (a === b && b === c) {
        // Triple match
        const p = PAYOUTS[a] || PAYOUTS['default'];
        credits += p.tripleCredits;
        updateCredits();
        showResult(p.triple + ' +' + p.tripleCredits + ' pts', 'win');
        winLine.style.borderColor = '#ff8c00';
        winLine.style.boxShadow   = '0 0 12px rgba(255,140,0,0.7), 0 0 24px rgba(255,140,0,0.3)';
        triggerWinEffects('triple');
      } else if (a === b || b === c || a === c) {
        // Double match
        const sym = (a === b) ? a : (b === c) ? b : a;
        const p = PAYOUTS[sym] || PAYOUTS['default'];
        credits += p.doubleCredits;
        updateCredits();
        showResult(p.double + ' +' + p.doubleCredits + ' pts', 'double');
        winLine.style.borderColor = '#ff8c00';
        winLine.style.boxShadow   = '0 0 8px rgba(255,140,0,0.4)';
        triggerWinEffects('double');
      } else {
        showResult('No match this time. Try again!', 'lose');
        triggerWinEffects('none');
      }

      if (credits < SPIN_COST) {
        spinBtn.disabled = true;
        setTimeout(() => {
          credits = INITIAL_CREDITS;
          updateCredits();
          showResult('Credits refilled! Good luck! 🌕', 'win');
          spinBtn.disabled = false;
        }, 1800);
      }
    }

    // ======================= SPIN (exact verbatim) =======================
    function spin() {
      if (spinning) return;
      if (credits < SPIN_COST) { showResult('Not enough credits!','lose'); return; }
      spinning = true; spinBtn.disabled = true;
      resultEl.classList.remove('show'); winLine.classList.remove('active');
      credits -= SPIN_COST; updateCredits();
      const finalMid = [randomSymbol(),randomSymbol(),randomSymbol()];
      const finalTop = [randomSymbol(),randomSymbol(),randomSymbol()];
      const finalBot = [randomSymbol(),randomSymbol(),randomSymbol()];
      for(let r=0;r<3;r++){
        buildReelStrip(r);
        strips[r].style.transform='translateY(0px)';
        strips[r].style.transition='none';
        reelWindows[r].classList.add('spinning');
        reelWindows[r].classList.remove('stopping');
      }
      const maxSpeed=symbolHeight*0.6, accelRate=symbolHeight*0.03;
      const stopDelays=[800,1300,1800], startTime=performance.now();
      const reelState=[0,1,2].map(()=>({pos:0,speed:0,done:false,targetPos:null}));
      function animateReels(now){
        const elapsed=now-startTime; let allDone=true;
        for(let r=0;r<3;r++){
          const st=reelState[r]; if(st.done) continue; allDone=false;
          if(st.targetPos===null){
            if(st.speed<maxSpeed) st.speed=Math.min(st.speed+accelRate,maxSpeed);
            st.pos+=st.speed;
            strips[r].style.transform=`translateY(${-st.pos}px)`;
            if(elapsed>stopDelays[r]){
              const curIdx=Math.floor(st.pos/symbolHeight), landIdx=curIdx+8;
              while(strips[r].children.length<=landIdx+3){
                const d=document.createElement('div'); d.className='reel-symbol';
                d.textContent=randomSymbol(); strips[r].appendChild(d);
              }
              strips[r].children[landIdx].textContent=finalTop[r];
              strips[r].children[landIdx+1].textContent=finalMid[r];
              strips[r].children[landIdx+2].textContent=finalBot[r];
              st.targetPos=landIdx*symbolHeight;
              reelWindows[r].classList.remove('spinning');
              reelWindows[r].classList.add('stopping');
            }
          } else {
            const dist=st.targetPos-st.pos;
            if(dist<=0.5){
              st.pos=st.targetPos; st.done=true;
              strips[r].style.transition='transform 0.15s cubic-bezier(0.34,1.56,0.64,1)';
              strips[r].style.transform=`translateY(${-st.pos}px)`;
              setTimeout(()=>{strips[r].style.transition='none';},200);
              continue;
            }
            st.speed=Math.max(dist*0.12,2);
            st.pos=Math.min(st.pos+st.speed,st.targetPos);
            strips[r].style.transform=`translateY(${-st.pos}px)`;
          }
        }
        if(!allDone) requestAnimationFrame(animateReels);
        else { evaluateResult(finalMid); spinning=false; if(credits>=SPIN_COST) spinBtn.disabled=false; }
      }
      requestAnimationFrame(animateReels);
    }

    // ======================= BUILD PAYOUT TABLE =======================
    function buildPayoutTable() {
      payoutTableEl.innerHTML = '';
      const rows = [
        { sym: '🌕🌕🌕', desc: 'Moon Grand Prize! 🎊',    pts: '+1000 pts' },
        { sym: '🥮🥮🥮', desc: 'Mooncake Gift Set! 🎁',    pts: '+500 pts'  },
        { sym: '🌟🌟🌟', desc: 'Star Festival Prize!',      pts: '+300 pts'  },
        { sym: '🏮🏮🏮', desc: 'Lantern Gift 100pts',       pts: '+100 pts'  },
        { sym: 'Any ×3',  desc: 'Festival Gift!',            pts: '+50 pts'   },
        { sym: '🌕🌕',   desc: 'Moon Voucher 50K',          pts: '+50 pts'   },
        { sym: '🥮🥮',   desc: 'Mooncake Box',              pts: '+100 pts'  },
        { sym: '🌟🌟',   desc: '+30 Star Points',           pts: '+30 pts'   },
        { sym: '🏮🏮',   desc: '+20 Lantern Pts',           pts: '+20 pts'   },
        { sym: 'Any ×2',  desc: '+10 Points',               pts: '+10 pts'   },
      ];
      rows.forEach(r => {
        const row = document.createElement('div');
        row.className = 'payout-row';
        row.innerHTML = `
          <span class="payout-symbols">${r.sym}</span>
          <span class="payout-desc">${r.desc}</span>
          <span class="payout-pts">${r.pts}</span>
        `;
        payoutTableEl.appendChild(row);
      });
    }

    // ======================= INIT =======================
    function init() {
      buildReels();
      buildLights();
      buildPayoutTable();
      updateCredits();
      showResult('Spin to win Festival Prizes!', '');
      resultEl.classList.add('show');
      spinBtn.addEventListener('click', spin);

      // Keyboard shortcut: Space or Enter to spin
      document.addEventListener('keydown', e => {
        if ((e.code === 'Space' || e.code === 'Enter') && !spinBtn.disabled) {
          e.preventDefault();
          spin();
        }
      });

      // Ambient light cycle on idle
      startLights(false);
      setTimeout(stopLights, 1200);
    }

    init();
  </script>
</body>
</html>
