<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎄 Christmas Gift Box</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  body{
    background:#0a0a1a;
    color:#fff;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100dvh;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
  }

  /* Night Sky Background */
  body::before{
    content:'';
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%,  rgba(0,40,80,.7)   0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,60,40,.5)   0%, transparent 50%),
      radial-gradient(ellipse 50% 60% at 20% 80%, rgba(30,10,60,.6)  0%, transparent 55%),
      radial-gradient(ellipse 100% 100% at 50% 50%,#0a0a1a 0%,#050510 100%);
    pointer-events:none;z-index:0;
  }

  /* Twinkling Stars */
  .stars-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--dur) ease-in-out infinite;
    animation-delay:var(--delay);
  }
  @keyframes twinkle{
    0%,100%{opacity:.15;transform:scale(1)}
    50%{opacity:.9;transform:scale(1.4)}
  }

  /* Snowflakes */
  .snowflake{
    position:fixed;top:-20px;color:rgba(255,255,255,.7);font-size:1.2em;
    animation:snowfall linear infinite;pointer-events:none;z-index:2;
    text-shadow:0 0 6px rgba(180,220,255,.8);
  }
  @keyframes snowfall{
    0%{transform:translateY(-20px) translateX(0) rotate(0deg);opacity:.85}
    25%{transform:translateY(25vh) translateX(18px) rotate(90deg);opacity:.7}
    50%{transform:translateY(50vh) translateX(-12px) rotate(180deg);opacity:.55}
    75%{transform:translateY(75vh) translateX(20px) rotate(270deg);opacity:.35}
    100%{transform:translateY(110vh) translateX(-8px) rotate(360deg);opacity:0}
  }

  /* Bring page content above bg layers */
  .back-btn,.title-section,.grid,.instruction,.result-overlay{position:relative;z-index:10}

  /* Festive top stripe */
  .festive-top{
    width:100%;height:4px;position:fixed;top:0;left:0;z-index:200;
    background:linear-gradient(90deg,
      #dc2626 0%,#16a34a 16.6%,#eab308 33.3%,
      #dc2626 50%,#16a34a 66.6%,#eab308 83.3%,#dc2626 100%);
  }

  /* Back Button */
  .back-btn{
    position:fixed;top:20px;left:16px;z-index:100;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    color:#fff;border-radius:12px;padding:10px 18px;font-size:15px;
    cursor:pointer;backdrop-filter:blur(12px);
    transition:background .2s,transform .15s;
    text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  }
  .back-btn:hover{background:rgba(255,255,255,.16);transform:scale(1.04)}
  .back-btn:active{transform:scale(.96)}

  /* Title */
  .title-section{text-align:center;padding:70px 20px 8px}
  .title{
    font-size:clamp(28px,7vw,50px);font-weight:800;
    background:linear-gradient(135deg,#ff3c3c,#ff8c00,#ffd700,#ffffff,#4ade80,#ff3c3c);
    background-size:300% 300%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:xmasGradient 5s ease infinite;letter-spacing:-1px;
    filter:drop-shadow(0 0 16px rgba(255,180,0,.3));
  }
  @keyframes xmasGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .subtitle{
    font-size:clamp(12px,3vw,16px);color:rgba(255,255,255,.55);margin-top:8px;
    text-shadow:0 0 12px rgba(0,200,100,.2);
  }

  /* Grid */
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:clamp(12px,3vw,24px);padding:clamp(12px,3vw,24px);
    max-width:520px;width:100%;margin-top:10px;perspective:1200px;
  }

  /* Gift Box Wrapper */
  .box-wrap{
    position:relative;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    aspect-ratio:1;animation:bob 3s ease-in-out infinite;
    transition:opacity .5s,transform .5s,filter .5s;
    -webkit-user-select:none;user-select:none;
  }
  .box-wrap:nth-child(2){animation-delay:-.5s}
  .box-wrap:nth-child(3){animation-delay:-1s}
  .box-wrap:nth-child(4){animation-delay:-1.5s}
  .box-wrap:nth-child(5){animation-delay:-2s}
  .box-wrap:nth-child(6){animation-delay:-2.5s}
  .box-wrap.faded{opacity:.1;transform:scale(.82);filter:blur(2px);pointer-events:none}
  .box-wrap.selected{z-index:10}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

  /* Shake */
  .box-wrap.shaking{animation:shake .12s ease-in-out 8}
  @keyframes shake{
    0%,100%{transform:translateX(0) rotate(0)}
    25%{transform:translateX(-6px) rotate(-3deg)}
    75%{transform:translateX(6px) rotate(3deg)}
  }

  /* 3D Gift Box */
  .gift-box{width:100%;height:100%;position:relative;transform-style:preserve-3d;perspective:600px;}

  /* Box Body */
  .box-body{
    position:absolute;bottom:0;left:8%;right:8%;height:62%;
    border-radius:6px 6px 4px 4px;
    box-shadow:0 6px 28px rgba(0,0,0,.6),inset 0 -8px 16px rgba(0,0,0,.3);
    overflow:hidden;
  }
  .box-body::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:22%;
    transform:translateX(-50%);background:rgba(255,255,255,.2);
    border-left:2px solid rgba(255,255,255,.28);border-right:2px solid rgba(255,255,255,.28);
  }
  .box-body::after{
    content:'';position:absolute;top:0;left:0;right:0;height:40%;
    background:linear-gradient(180deg,rgba(255,255,255,.14),transparent);pointer-events:none;
  }

  /* Lid */
  .box-lid{
    position:absolute;top:18%;left:4%;right:4%;height:24%;
    border-radius:6px 6px 3px 3px;transform-origin:center bottom;
    transition:transform .65s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 -2px 10px rgba(0,0,0,.35),inset 0 2px 6px rgba(255,255,255,.18);z-index:2;
  }
  .box-lid::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:24%;
    transform:translateX(-50%);background:rgba(255,255,255,.2);
    border-left:2px solid rgba(255,255,255,.28);border-right:2px solid rgba(255,255,255,.28);
  }
  /* Bow */
  .box-lid::after{
    content:'';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    width:30px;height:18px;
    background:
      radial-gradient(ellipse at 28% 80%,rgba(255,255,255,.4),transparent 55%),
      radial-gradient(ellipse at 72% 80%,rgba(255,255,255,.4),transparent 55%);
    border-radius:50% 50% 0 0;filter:drop-shadow(0 -2px 4px rgba(0,0,0,.4));
  }
  .box-wrap.opened .box-lid{transform:rotateX(-110deg) translateY(-10px);}

  /* Prize Inside */
  .prize-inside{
    position:absolute;top:20%;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;
    opacity:0;transform:scale(0) translateY(30px);pointer-events:none;z-index:5;transition:none;
  }
  .box-wrap.reveal .prize-inside{animation:prizeFloat .85s cubic-bezier(.17,.89,.32,1.28) forwards;}
  @keyframes prizeFloat{
    0%{opacity:0;transform:scale(0) translateY(30px)}
    60%{opacity:1;transform:scale(1.28) translateY(-32px)}
    80%{transform:scale(.96) translateY(-27px)}
    100%{opacity:1;transform:scale(1.12) translateY(-30px)}
  }
  .prize-emoji{font-size:clamp(36px,10vw,56px);filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))}

  /* BOX COLORS - Christmas */
  .box-red    .box-body{background:linear-gradient(145deg,#7f1d1d,#dc2626)}
  .box-red    .box-lid {background:linear-gradient(145deg,#dc2626,#ef4444)}
  .box-green  .box-body{background:linear-gradient(145deg,#14532d,#16a34a)}
  .box-green  .box-lid {background:linear-gradient(145deg,#16a34a,#22c55e)}
  .box-gold   .box-body{background:linear-gradient(145deg,#78350f,#ca8a04)}
  .box-gold   .box-lid {background:linear-gradient(145deg,#ca8a04,#eab308)}
  .box-silver .box-body{background:linear-gradient(145deg,#1e293b,#475569)}
  .box-silver .box-lid {background:linear-gradient(145deg,#475569,#94a3b8)}
  .box-purple .box-body{background:linear-gradient(145deg,#581c87,#7c3aed)}
  .box-purple .box-lid {background:linear-gradient(145deg,#7c3aed,#a855f7)}
  .box-blue   .box-body{background:linear-gradient(145deg,#1e3a5f,#2563eb)}
  .box-blue   .box-lid {background:linear-gradient(145deg,#2563eb,#60a5fa)}

  /* Result Overlay */
  .result-overlay{
    position:fixed;inset:0;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,5,18,.9);backdrop-filter:blur(14px);
    opacity:0;pointer-events:none;transition:opacity .4s;padding:20px;
  }
  .result-overlay.active{opacity:1;pointer-events:auto}
  .result-card{
    text-align:center;padding:clamp(24px,5vw,48px);border-radius:24px;
    background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(20px);max-width:390px;width:100%;
    transform:translateY(40px) scale(.9);transition:transform .5s cubic-bezier(.17,.89,.32,1.28);
    position:relative;overflow:hidden;
  }
  .result-card::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.03) 50%,transparent 70%);
    animation:cardShimmer 3s ease-in-out infinite;pointer-events:none;
  }
  @keyframes cardShimmer{0%,100%{opacity:0}50%{opacity:1}}
  .result-overlay.active .result-card{transform:translateY(0) scale(1)}

  .result-emoji{font-size:clamp(60px,16vw,84px);margin-bottom:12px;display:block}
  .result-label{font-size:clamp(22px,6vw,34px);font-weight:800;margin-bottom:6px}
  .result-desc{font-size:clamp(13px,3.5vw,17px);color:rgba(255,255,255,.6);margin-bottom:24px}
  .result-tier{
    display:inline-block;padding:4px 14px;border-radius:20px;
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;
  }
  .tier-legendary{background:linear-gradient(135deg,#ffd700,#ff6500);color:#1a0800;box-shadow:0 0 28px rgba(255,180,0,.5)}
  .tier-epic     {background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;box-shadow:0 0 24px rgba(168,85,247,.45)}
  .tier-rare     {background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 0 24px rgba(59,130,246,.4)}
  .tier-common   {background:linear-gradient(135deg,#6b7280,#4b5563);color:#fff}

  .result-glow{
    position:absolute;top:50%;left:50%;width:240px;height:240px;border-radius:50%;
    transform:translate(-50%,-50%);opacity:.28;filter:blur(64px);pointer-events:none;z-index:-1;
  }
  .glow-legendary{background:radial-gradient(circle,#ffd700,#ff4500)}
  .glow-epic     {background:radial-gradient(circle,#a855f7,#6d28d9)}
  .glow-rare     {background:radial-gradient(circle,#3b82f6,#1d4ed8)}
  .glow-common   {background:radial-gradient(circle,#6b7280,#374151)}

  /* Play Again - Christmas Red */
  .play-again-btn{
    padding:14px 36px;border-radius:14px;border:none;
    background:linear-gradient(135deg,#991b1b,#dc2626,#ef4444);
    color:#fff;font-size:17px;font-weight:700;cursor:pointer;
    transition:transform .15s,box-shadow .2s;
    box-shadow:0 4px 22px rgba(185,28,28,.5);letter-spacing:.3px;
  }
  .play-again-btn:hover{transform:scale(1.06);box-shadow:0 6px 30px rgba(185,28,28,.65)}
  .play-again-btn:active{transform:scale(.96)}

  /* Sparkle */
  .sparkle{
    position:fixed;width:8px;height:8px;border-radius:50%;
    pointer-events:none;z-index:400;animation:sparklePop .75s ease-out forwards;
  }
  @keyframes sparklePop{
    0%{opacity:1;transform:scale(0) translate(0,0)}
    100%{opacity:0;transform:scale(1.2) translate(var(--sx),var(--sy))}
  }

  /* Confetti */
  .confetti-piece{
    position:fixed;top:-14px;z-index:500;pointer-events:none;
    animation:confettiFall var(--dur) linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotateZ(0) rotateX(0);opacity:1}
    80%{opacity:1}
    100%{transform:translateY(108vh) rotateZ(var(--rz)) rotateX(720deg);opacity:0}
  }

  /* Instruction */
  .instruction{
    text-align:center;font-size:clamp(13px,3vw,15px);color:rgba(255,255,255,.4);
    padding:6px 20px 28px;transition:opacity .3s;
  }

  @media(min-width:520px){.grid{gap:28px;padding:28px}}
</style>
</head>
<body>

<!-- Festive top stripe -->
<div class="festive-top"></div>

<!-- Stars (populated by JS) -->
<div class="stars-layer" id="starsLayer"></div>

<!-- Snowflakes -->
<span class="snowflake" style="left:5%;animation-duration:12s;animation-delay:0s;font-size:1.4em">❄</span>
<span class="snowflake" style="left:12%;animation-duration:17s;animation-delay:-3s;font-size:.9em">❄</span>
<span class="snowflake" style="left:22%;animation-duration:9s;animation-delay:-6s;font-size:1.1em">❄</span>
<span class="snowflake" style="left:35%;animation-duration:14s;animation-delay:-1s;font-size:.8em">❄</span>
<span class="snowflake" style="left:48%;animation-duration:20s;animation-delay:-8s;font-size:1.3em">❄</span>
<span class="snowflake" style="left:60%;animation-duration:11s;animation-delay:-4s;font-size:1.0em">❄</span>
<span class="snowflake" style="left:71%;animation-duration:16s;animation-delay:-2s;font-size:.85em">❄</span>
<span class="snowflake" style="left:82%;animation-duration:13s;animation-delay:-7s;font-size:1.2em">❄</span>
<span class="snowflake" style="left:91%;animation-duration:18s;animation-delay:-5s;font-size:.95em">❄</span>
<span class="snowflake" style="left:28%;animation-duration:15s;animation-delay:-10s;font-size:1.5em">❄</span>

<!-- Back Button -->
<a href="../index.html" class="back-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  Back
</a>

<!-- Title -->
<div class="title-section">
  <h1 class="title">🎄 Christmas Gift Box</h1>
  <p class="subtitle">Choose a gift box and claim your Christmas prize!</p>
</div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<p class="instruction" id="instruction">Tap a gift box to open it</p>

<!-- Result Overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-glow" id="resultGlow"></div>
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-tier" id="resultTier"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="play-again-btn" id="playAgainBtn">🎁 Open Again</button>
  </div>
</div>

<script>
var PRIZES = [
  { emoji: '\u{1F384}', label: 'Christmas Jackpot!',   description: 'Premium Christmas gift worth 500k!',  tier: 'legendary' },
  { emoji: '\u{1F381}', label: 'Special Voucher',       description: 'Year-end shopping voucher 200k',      tier: 'epic'      },
  { emoji: '\u2B50',     label: 'New Year Bonus',        description: 'Year-end bonus 500 points',           tier: 'rare'      },
  { emoji: '\u{1F98C}', label: "Santa's Gift",          description: 'A secret gift from Santa',            tier: 'rare'      },
  { emoji: '\u2744\uFE0F', label: '200 Points',         description: 'Added to your account',               tier: 'common'    },
  { emoji: '\u{1F514}', label: '100 Points',            description: 'Jingle bells! Good luck!',            tier: 'common'    },
];

var TIER_WEIGHTS = { legendary:1, epic:3, rare:8, common:15 };
var BOX_COLORS   = ['red','green','gold','silver','purple','blue'];

var boxPrizes   = [];
var isAnimating = false;

var grid         = document.getElementById('grid');
var instruction  = document.getElementById('instruction');
var overlay      = document.getElementById('resultOverlay');
var resultEmoji  = document.getElementById('resultEmoji');
var resultLabel  = document.getElementById('resultLabel');
var resultDesc   = document.getElementById('resultDesc');
var resultTier   = document.getElementById('resultTier');
var resultGlow   = document.getElementById('resultGlow');
var playAgainBtn = document.getElementById('playAgainBtn');

function weightedPick() {
  var pool = [];
  PRIZES.forEach(function(p) {
    var w = TIER_WEIGHTS[p.tier] || 5;
    for (var i = 0; i < w; i++) pool.push(p);
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function buildBoxes() {
  grid.innerHTML = '';
  boxPrizes = [];
  isAnimating = false;
  instruction.textContent = 'Tap a gift box to open it';
  instruction.style.opacity = '1';
  overlay.classList.remove('active');
  document.querySelectorAll('.confetti-piece').forEach(function(c){ c.remove(); });

  var colors = BOX_COLORS.slice();
  for (var i = colors.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = colors[i]; colors[i] = colors[j]; colors[j] = tmp;
  }

  for (var i = 0; i < 6; i++) {
    var prize = weightedPick();
    boxPrizes.push(prize);
    var wrap = document.createElement('div');
    wrap.className = 'box-wrap box-' + colors[i];
    wrap.dataset.index = i;
    wrap.setAttribute('role','button');
    wrap.setAttribute('aria-label','Gift box ' + (i+1));
    wrap.innerHTML =
      '<div class="gift-box">' +
        '<div class="box-body"></div>' +
        '<div class="box-lid"></div>' +
        '<div class="prize-inside"><span class="prize-emoji">' + prize.emoji + '</span></div>' +
      '</div>';
    wrap.addEventListener('click', (function(idx,el){ return function(){ selectBox(idx,el); }; })(i,wrap));
    grid.appendChild(wrap);
  }
}

function selectBox(index, wrap) {
  if (isAnimating) return;
  isAnimating = true;
  instruction.style.opacity = '0';
  var allBoxes = grid.querySelectorAll('.box-wrap');
  wrap.classList.add('shaking','selected');
  setTimeout(function(){
    wrap.classList.remove('shaking');
    wrap.classList.add('opened');
    allBoxes.forEach(function(b){ if(b !== wrap) b.classList.add('faded'); });
    setTimeout(function(){
      wrap.classList.add('reveal');
      spawnSparkles(wrap);
      var prize = boxPrizes[index];
      if (prize.tier === 'legendary' || prize.tier === 'epic') spawnConfetti();
      setTimeout(function(){ showResult(prize); }, 1200);
    }, 520);
  }, 960);
}

function showResult(prize) {
  resultEmoji.textContent = prize.emoji;
  resultLabel.textContent = prize.label;
  resultDesc.textContent  = prize.description;
  var tl = prize.tier === 'legendary' ? 'LEGENDARY'
         : prize.tier === 'epic'      ? 'EPIC'
         : prize.tier === 'rare'      ? 'RARE' : 'COMMON';
  resultTier.textContent = tl;
  resultTier.className = 'result-tier tier-' + prize.tier;
  resultGlow.className = 'result-glow glow-' + prize.tier;
  overlay.classList.add('active');
}

function spawnSparkles(wrap) {
  var rect   = wrap.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top  + rect.height * 0.3;
  var colors = ['#ffd700','#dc2626','#16a34a','#ffffff','#60a5fa','#f97316','#a855f7'];
  for (var i = 0; i < 16; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    var angle = (Math.PI * 2 / 16) * i + Math.random() * 0.3;
    var dist  = 32 + Math.random() * 55;
    s.style.cssText = 'left:'+cx+'px;top:'+cy+'px;' +
      'background:'+colors[i % colors.length]+';' +
      '--sx:'+(Math.cos(angle)*dist)+'px;' +
      '--sy:'+(Math.sin(angle)*dist)+'px;';
    document.body.appendChild(s);
    setTimeout((function(el){ return function(){ el.remove(); }; })(s), 800);
  }
}

function spawnConfetti() {
  var colors = [
    '#dc2626','#ef4444','#b91c1c',
    '#16a34a','#22c55e','#15803d',
    '#ffd700','#eab308','#f59e0b',
    '#ffffff','#e2e8f0',
    '#60a5fa','#93c5fd'
  ];
  for (var i = 0; i < 70; i++) {
    var c   = document.createElement('div');
    c.className = 'confetti-piece';
    var dur  = 2.2 + Math.random() * 2;
    var left = Math.random() * 100;
    var w    = 6  + Math.random() * 9;
    var h    = 5  + Math.random() * 7;
    var rz   = (Math.random() * 720 - 360) + 'deg';
    var delay= Math.random() * 0.9;
    c.style.cssText =
      'left:'+left+'%;width:'+w+'px;height:'+h+'px;' +
      'background:'+colors[i % colors.length]+';' +
      'border-radius:'+(Math.random()>.5?'50%':'2px')+';' +
      '--dur:'+dur+'s;--rz:'+rz+';' +
      'animation-delay:'+delay+'s;';
    document.body.appendChild(c);
    setTimeout((function(el){ return function(){ el.remove(); }; })(c), (dur+delay)*1000+200);
  }
}

playAgainBtn.addEventListener('click', function(){
  overlay.classList.remove('active');
  setTimeout(buildBoxes, 400);
});

(function generateStars(){
  var layer = document.getElementById('starsLayer');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size  = 1 + Math.random() * 2.5;
    var dur   = 2 + Math.random() * 4;
    var delay = Math.random() * 5;
    s.style.cssText =
      'left:'+(Math.random()*100)+'%;' +
      'top:' +(Math.random()*100)+'%;' +
      'width:'+size+'px;height:'+size+'px;' +
      '--dur:'+dur+'s;--delay:-'+delay+'s;';
    layer.appendChild(s);
  }
})();

buildBoxes();
<\/script>
</body>
