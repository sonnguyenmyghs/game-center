<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Memory Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 25% 30%, rgba(108, 92, 231, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 60%, rgba(255, 56, 100, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(0, 198, 255, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 16px 40px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .back-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Header */
    header {
      text-align: center;
      padding: 16px 0 12px;
    }

    header .title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3864, #6c5ce7, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header .subtitle {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 12px 0 16px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
    }

    .stat-item .stat-icon {
      font-size: 1rem;
    }

    .stat-item .stat-label {
      color: rgba(255, 255, 255, 0.5);
    }

    .stat-item .stat-value {
      font-weight: 700;
      color: #fff;
      min-width: 20px;
      text-align: center;
    }

    .stars-display {
      display: flex;
      gap: 2px;
    }

    .stars-display .star {
      font-size: 1.1rem;
      transition: all 0.3s;
    }

    .stars-display .star.active {
      filter: drop-shadow(0 0 4px rgba(255, 200, 0, 0.5));
    }

    .stars-display .star.inactive {
      opacity: 0.25;
    }

    /* Start Screen */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .start-screen {
      text-align: center;
      padding: 40px 0;
    }

    .start-screen .game-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .start-screen h2 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .start-screen p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .difficulty-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .diff-btn {
      position: relative;
      padding: 16px 28px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .diff-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .diff-btn.selected {
      border-color: #6c5ce7;
      background: rgba(108, 92, 231, 0.15);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
    }

    .diff-btn .diff-label {
      display: block;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      font-weight: 400;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(108, 92, 231, 0.45);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .best-scores {
      margin-top: 28px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
    }

    .best-scores h3 {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .best-scores .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.9rem;
    }

    .best-scores .score-row .score-diff {
      color: rgba(255, 255, 255, 0.5);
    }

    .best-scores .score-row .score-val {
      font-weight: 700;
      color: #ffd700;
    }

    .best-scores .no-scores {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      font-style: italic;
    }

    /* Game Board */
    .game-board {
      perspective: 1000px;
    }

    .card-grid {
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .card-grid.grid-4x4 {
      grid-template-columns: repeat(4, 1fr);
      max-width: 360px;
    }

    .card-grid.grid-6x6 {
      grid-template-columns: repeat(6, 1fr);
      max-width: 480px;
    }

    /* Card */
    .card {
      position: relative;
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 600px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-back {
      background: linear-gradient(135deg, #1a1a3e, #2a1a4e);
      border: 2px solid rgba(108, 92, 231, 0.3);
      overflow: hidden;
    }

    .card-back::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 30% 30%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
    }

    .card-back::after {
      content: '?';
      font-size: 1.5rem;
      font-weight: 800;
      color: rgba(108, 92, 231, 0.4);
    }

    .card-grid.grid-6x6 .card-back::after {
      font-size: 1.1rem;
    }

    .card-front {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(108, 92, 231, 0.4);
      transform: rotateY(180deg);
    }

    .card-front .card-emoji {
      font-size: 2rem;
      line-height: 1;
    }

    .card-grid.grid-6x6 .card-front .card-emoji {
      font-size: 1.4rem;
    }

    /* Card matched state */
    .card.matched .card-front {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.08);
      animation: matchGlow 1.5s ease-in-out infinite;
    }

    .card.matched .card-inner {
      transform: rotateY(180deg) scale(1.05);
    }

    @keyframes matchGlow {
      0%, 100% {
        box-shadow: 0 0 8px rgba(255, 215, 0, 0.3), 0 0 20px rgba(255, 215, 0, 0.1);
      }
      50% {
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 0 35px rgba(255, 215, 0, 0.2);
      }
    }

    /* Match pop animation */
    @keyframes matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      30% { transform: rotateY(180deg) scale(1.15); }
      60% { transform: rotateY(180deg) scale(0.95); }
      100% { transform: rotateY(180deg) scale(1.05); }
    }

    .card.match-pop .card-inner {
      animation: matchPop 0.5s ease forwards;
    }

    /* No match shake */
    @keyframes noMatchShake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      20% { transform: rotateY(180deg) translateX(-5px); }
      40% { transform: rotateY(180deg) translateX(5px); }
      60% { transform: rotateY(180deg) translateX(-4px); }
      80% { transform: rotateY(180deg) translateX(4px); }
    }

    .card.no-match .card-inner {
      animation: noMatchShake 0.4s ease;
    }

    .card.locked {
      pointer-events: none;
    }

    /* Restart button */
    .game-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .ctrl-btn {
      padding: 10px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* Win Screen */
    .win-screen {
      text-align: center;
      padding: 30px 0;
    }

    .win-screen .trophy {
      font-size: 4rem;
      margin-bottom: 12px;
      animation: float 2.5s ease-in-out infinite;
    }

    .win-screen h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .win-screen .win-subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .win-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 320px;
      margin: 0 auto 20px;
    }

    .win-stat {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 10px;
    }

    .win-stat .ws-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .win-stat .ws-value {
      font-size: 1.3rem;
      font-weight: 800;
    }

    .win-stat .ws-value.gold {
      color: #ffd700;
    }

    .win-stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 20px;
    }

    .win-stars .star {
      font-size: 2rem;
      transition: all 0.3s;
    }

    .win-stars .star.active {
      filter: drop-shadow(0 0 8px rgba(255, 200, 0, 0.6));
      animation: starPop 0.5s ease backwards;
    }

    .win-stars .star:nth-child(2).active {
      animation-delay: 0.15s;
    }

    .win-stars .star:nth-child(3).active {
      animation-delay: 0.3s;
    }

    .win-stars .star.inactive {
      opacity: 0.2;
    }

    @keyframes starPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    .high-score-badge {
      display: inline-block;
      padding: 6px 16px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 0, 0.15));
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      color: #ffd700;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.15); }
      50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
    }

    .win-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .play-again-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
    }

    .play-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(108, 92, 231, 0.45);
    }

    .menu-btn {
      padding: 10px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotateZ(0deg) rotateX(0deg);
        opacity: 1;
      }
      75% {
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotateZ(720deg) rotateX(360deg);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 400px) {
      .card-grid.grid-4x4 {
        gap: 6px;
        max-width: 300px;
      }

      .card-grid.grid-6x6 {
        gap: 4px;
        max-width: 340px;
      }

      .card-grid.grid-6x6 .card-front .card-emoji {
        font-size: 1.1rem;
      }

      .card-grid.grid-6x6 .card-back::after {
        font-size: 0.9rem;
      }

      .stats-bar {
        gap: 8px;
      }

      .stat-item {
        padding: 6px 10px;
        font-size: 0.8rem;
      }
    }

    /* Fade transition */
    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back
    </a>

    <header>
      <div class="title">Memory Card</div>
      <div class="subtitle">Match the pairs to win</div>
    </header>

    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
      <div class="start-screen fade-in">
        <div class="game-icon">🃏</div>
        <h2>Choose Difficulty</h2>
        <p>Flip cards to find matching pairs.<br>Fewer moves and less time means a higher score!</p>

        <div class="difficulty-selector">
          <button class="diff-btn selected" data-mode="easy" onclick="selectDifficulty('easy')">
            Easy
            <span class="diff-label">4 x 4 (8 pairs)</span>
          </button>
          <button class="diff-btn" data-mode="hard" onclick="selectDifficulty('hard')">
            Hard
            <span class="diff-label">6 x 6 (18 pairs)</span>
          </button>
        </div>

        <button class="start-btn" onclick="startGame()">
          Start Game
        </button>

        <div class="best-scores" id="bestScores"></div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
      <div class="stats-bar" id="statsBar">
        <div class="stat-item">
          <span class="stat-icon">⏱️</span>
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">0:00</span>
        </div>
        <div class="stat-item">
          <span class="stat-icon">👆</span>
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="moves">0</span>
        </div>
        <div class="stat-item">
          <div class="stars-display" id="starsDisplay">
            <span class="star active">⭐</span>
            <span class="star active">⭐</span>
            <span class="star active">⭐</span>
          </div>
        </div>
      </div>

      <div class="game-board">
        <div class="card-grid" id="cardGrid"></div>
      </div>

      <div class="game-controls">
        <button class="ctrl-btn" onclick="restartGame()">Restart</button>
        <button class="ctrl-btn" onclick="goToMenu()">Menu</button>
      </div>
    </div>

    <!-- Win Screen -->
    <div id="winScreen" class="screen">
      <div class="win-screen fade-in" id="winContent"></div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    // --- Game State ---
    const ALL_EMOJIS = ['🎮', '🎯', '🏆', '⭐', '🎪', '🎨', '🎭', '🎵', '🌟', '🔥', '💎', '🎁', '🍀', '🌈', '🦋', '🎈', '🍭', '🧩'];
    let difficulty = 'easy';
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let totalPairs = 0;
    let moves = 0;
    let timerInterval = null;
    let seconds = 0;
    let isLocked = false;
    let gameStarted = false;

    // --- Difficulty ---
    function selectDifficulty(mode) {
      difficulty = mode;
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.mode === mode);
      });
      renderBestScores();
    }

    // --- Screens ---
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
      clearInterval(timerInterval);
      showScreen('startScreen');
      renderBestScores();
    }

    // --- Shuffle ---
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // --- Start ---
    function startGame() {
      const gridSize = difficulty === 'easy' ? 4 : 6;
      totalPairs = (gridSize * gridSize) / 2;

      // Pick emojis
      const shuffledEmojis = shuffle(ALL_EMOJIS);
      const selectedEmojis = shuffledEmojis.slice(0, totalPairs);

      // Create card pairs
      const cardValues = shuffle([...selectedEmojis, ...selectedEmojis]);

      // Reset state
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      seconds = 0;
      isLocked = false;
      gameStarted = false;
      clearInterval(timerInterval);

      // Build grid
      const grid = document.getElementById('cardGrid');
      grid.className = 'card-grid';
      grid.classList.add(difficulty === 'easy' ? 'grid-4x4' : 'grid-6x6');
      grid.innerHTML = '';

      cards = [];
      cardValues.forEach((emoji, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = idx;
        card.dataset.value = emoji;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">
              <span class="card-emoji">${emoji}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => flipCard(card));
        grid.appendChild(card);
        cards.push(card);
      });

      // Update UI
      document.getElementById('moves').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      updateStars();
      showScreen('gameScreen');
    }

    function restartGame() {
      clearInterval(timerInterval);
      startGame();
    }

    // --- Timer ---
    function startTimer() {
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
      }, 1000);
    }

    // --- Stars ---
    function getStars(moveCount, mode) {
      if (mode === 'easy') {
        if (moveCount < 10) return 3;
        if (moveCount < 15) return 2;
        if (moveCount < 20) return 1;
        return 0;
      } else {
        if (moveCount < 24) return 3;
        if (moveCount < 36) return 2;
        if (moveCount < 48) return 1;
        return 0;
      }
    }

    function updateStars() {
      const stars = getStars(moves, difficulty);
      const display = document.getElementById('starsDisplay');
      display.innerHTML = [0, 1, 2].map(i =>
        `<span class="star ${i < stars ? 'active' : 'inactive'}">⭐</span>`
      ).join('');
    }

    // --- Flip ---
    function flipCard(card) {
      if (isLocked) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;
      if (flippedCards.length >= 2) return;

      // Start timer on first flip
      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        updateStars();
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flippedCards;
      if (a.dataset.value === b.dataset.value) {
        // Match!
        isLocked = true;
        setTimeout(() => {
          a.classList.add('matched', 'match-pop');
          b.classList.add('matched', 'match-pop');
          a.classList.add('locked');
          b.classList.add('locked');
          matchedPairs++;
          flippedCards = [];
          isLocked = false;

          if (matchedPairs === totalPairs) {
            clearInterval(timerInterval);
            setTimeout(() => showWinScreen(), 600);
          }
        }, 300);
      } else {
        // No match
        isLocked = true;
        setTimeout(() => {
          a.classList.add('no-match');
          b.classList.add('no-match');
        }, 400);
        setTimeout(() => {
          a.classList.remove('flipped', 'no-match');
          b.classList.remove('flipped', 'no-match');
          flippedCards = [];
          isLocked = false;
        }, 1000);
      }
    }

    // --- Score ---
    function calculateScore(moveCount, time, mode) {
      const pairs = mode === 'easy' ? 8 : 18;
      const basePerfectMoves = pairs;
      const moveEfficiency = Math.max(0, 1 - (moveCount - basePerfectMoves) / (basePerfectMoves * 3));
      const timeBonus = Math.max(0, 1 - time / (pairs * 15));
      const score = Math.round((moveEfficiency * 7000 + timeBonus * 3000) * (mode === 'hard' ? 1.5 : 1));
      return Math.max(0, score);
    }

    // --- LocalStorage ---
    function getStorageKey(mode) {
      return `memoryCard_best_${mode}`;
    }

    function getBestScores(mode) {
      try {
        const data = localStorage.getItem(getStorageKey(mode));
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveBestScore(mode, scoreObj) {
      const scores = getBestScores(mode);
      scores.push(scoreObj);
      scores.sort((a, b) => b.score - a.score);
      const top5 = scores.slice(0, 5);
      localStorage.setItem(getStorageKey(mode), JSON.stringify(top5));
      return top5;
    }

    // --- Best Scores Panel ---
    function renderBestScores() {
      const container = document.getElementById('bestScores');
      const easyScores = getBestScores('easy');
      const hardScores = getBestScores('hard');

      let html = '<h3>Best Scores</h3>';

      if (easyScores.length === 0 && hardScores.length === 0) {
        html += '<p class="no-scores">No scores yet. Play a game!</p>';
      } else {
        if (easyScores.length > 0) {
          html += easyScores.slice(0, 3).map((s, i) =>
            `<div class="score-row">
              <span class="score-diff">Easy #${i + 1}</span>
              <span class="score-val">${s.score.toLocaleString()}</span>
            </div>`
          ).join('');
        }
        if (hardScores.length > 0) {
          html += hardScores.slice(0, 3).map((s, i) =>
            `<div class="score-row">
              <span class="score-diff">Hard #${i + 1}</span>
              <span class="score-val">${s.score.toLocaleString()}</span>
            </div>`
          ).join('');
        }
      }

      container.innerHTML = html;
    }

    // --- Win Screen ---
    function showWinScreen() {
      const score = calculateScore(moves, seconds, difficulty);
      const stars = getStars(moves, difficulty);

      const scoreObj = { score, moves, time: seconds, stars, date: Date.now() };
      const allScores = saveBestScore(difficulty, scoreObj);
      const isHighScore = allScores[0].date === scoreObj.date;

      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      const timeStr = `${m}:${s.toString().padStart(2, '0')}`;

      const winContent = document.getElementById('winContent');
      winContent.innerHTML = `
        <div class="trophy">🏆</div>
        <h2>You Win!</h2>
        <p class="win-subtitle">${difficulty === 'easy' ? 'Easy' : 'Hard'} Mode Complete</p>

        <div class="win-stars">
          ${[0, 1, 2].map(i => `<span class="star ${i < stars ? 'active' : 'inactive'}">⭐</span>`).join('')}
        </div>

        ${isHighScore ? '<div class="high-score-badge">New High Score!</div>' : ''}

        <div class="win-stats">
          <div class="win-stat">
            <div class="ws-label">Score</div>
            <div class="ws-value gold">${score.toLocaleString()}</div>
          </div>
          <div class="win-stat">
            <div class="ws-label">Time</div>
            <div class="ws-value">${timeStr}</div>
          </div>
          <div class="win-stat">
            <div class="ws-label">Moves</div>
            <div class="ws-value">${moves}</div>
          </div>
          <div class="win-stat">
            <div class="ws-label">Best</div>
            <div class="ws-value gold">${allScores[0].score.toLocaleString()}</div>
          </div>
        </div>

        <div class="win-actions">
          <button class="play-again-btn" onclick="startGame()">Play Again</button>
          <button class="menu-btn" onclick="goToMenu()">Back to Menu</button>
        </div>
      `;

      showScreen('winScreen');
      launchConfetti();

      // Dispatch leaderboard event for game-center integration
      try {
        window.dispatchEvent(new CustomEvent('game-score', {
          detail: {
            game: 'memory-card',
            score: score,
            difficulty: difficulty,
            moves: moves,
            time: seconds,
            stars: stars
          }
        }));
      } catch (e) {}
    }

    // --- Confetti ---
    function launchConfetti() {
      const container = document.getElementById('confettiContainer');
      container.innerHTML = '';
      const colors = ['#ff3864', '#6c5ce7', '#00c6ff', '#ffd700', '#ff8c00', '#a855f7', '#22c55e'];

      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const left = Math.random() * 100;
        const size = Math.random() * 8 + 5;
        const duration = Math.random() * 2 + 2;
        const delay = Math.random() * 1.5;
        const shape = Math.random() > 0.5 ? '50%' : '0';

        el.style.cssText = `
          left: ${left}%;
          width: ${size}px;
          height: ${size}px;
          background: ${color};
          border-radius: ${shape};
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
        `;
        container.appendChild(el);
      }

      setTimeout(() => { container.innerHTML = ''; }, 4500);
    }

    // --- Init ---
    renderBestScores();
  </script>
</body>
</html>
