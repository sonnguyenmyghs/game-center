<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #back-btn {
    position: fixed; top: 12px; left: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc; font-size: 14px;
    padding: 6px 14px; border-radius: 6px;
    cursor: pointer; z-index: 100;
    text-decoration: none;
    font-family: 'Courier New', monospace;
    transition: background 0.2s;
  }
  #back-btn:hover { background: rgba(255,255,255,0.15); }
  canvas {
    display: block;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
  }
</style>
</head>
<body>
<div id="container">
  <a id="back-btn" href="../index.html">&#8592; Back</a>
  <canvas id="game"></canvas>
</div>
<script>
(function() {
  'use strict';

  // === CONFIG ===
  const CONFIG = {
    gravity: 0.6,
    jumpForce: -12,
    doubleJumpForce: -10,
    initialSpeed: 5,
    maxSpeed: 15,
    speedIncrement: 0.001,
    groundHeight: 50,
  };

  // === CANVAS SETUP ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H, GROUND_Y, SCALE;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    SCALE = Math.min(W / 800, H / 400, 1.5);
    GROUND_Y = H - CONFIG.groundHeight * SCALE;
  }
  window.addEventListener('resize', resize);
  resize();

  // === GAME STATE ===
  const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2 };
  let gameState = STATE.START;
  let score = 0;
  let highScore = parseInt(localStorage.getItem('dinoRunnerHighScore')) || 0;
  let speed = CONFIG.initialSpeed;
  let frameCount = 0;
  let lastMilestone = 0;
  let milestoneFlashTimer = 0;
  let screenFlashTimer = 0;
  let dayNightTimer = 0;

  // === DINO ===
  const dino = {
    x: 0, y: 0, w: 0, h: 0,
    vy: 0, grounded: true, jumps: 0,
    ducking: false, legFrame: 0, legTimer: 0,
    squash: 1, stretch: 1,
    idleBob: 0,
    normalH: 0, duckH: 0, normalW: 0,
  };

  function initDino() {
    dino.normalW = 40 * SCALE;
    dino.normalH = 50 * SCALE;
    dino.duckH = 30 * SCALE;
    dino.w = dino.normalW;
    dino.h = dino.normalH;
    dino.x = 60 * SCALE;
    dino.y = GROUND_Y - dino.h;
    dino.vy = 0;
    dino.grounded = true;
    dino.jumps = 0;
    dino.ducking = false;
    dino.legFrame = 0;
    dino.legTimer = 0;
    dino.squash = 1;
    dino.stretch = 1;
  }

  // === DUST PARTICLES ===
  let dustParticles = [];

  function spawnDust() {
    for (let i = 0; i < 6; i++) {
      dustParticles.push({
        x: dino.x + dino.w * 0.5 + (Math.random() - 0.5) * dino.w * 0.6,
        y: GROUND_Y,
        vx: (Math.random() - 0.5) * 3 * SCALE,
        vy: -Math.random() * 3 * SCALE,
        life: 1,
        size: (2 + Math.random() * 3) * SCALE,
      });
    }
  }

  // === OBSTACLES ===
  let obstacles = [];
  let obstacleTimer = 0;

  function spawnObstacle() {
    const r = Math.random();
    if (r < 0.35) {
      // Short cactus
      const h = (25 + Math.random() * 15) * SCALE;
      obstacles.push({
        type: 'cactus', x: W + 20, y: GROUND_Y - h,
        w: 15 * SCALE, h: h, variant: 'short'
      });
    } else if (r < 0.7) {
      // Tall cactus
      const h = (45 + Math.random() * 20) * SCALE;
      obstacles.push({
        type: 'cactus', x: W + 20, y: GROUND_Y - h,
        w: 18 * SCALE, h: h, variant: 'tall'
      });
    } else if (r < 0.85) {
      // Cactus cluster (2-3 cacti together)
      const count = Math.random() < 0.5 ? 2 : 3;
      for (let i = 0; i < count; i++) {
        const h = (30 + Math.random() * 25) * SCALE;
        obstacles.push({
          type: 'cactus', x: W + 20 + i * 18 * SCALE, y: GROUND_Y - h,
          w: 14 * SCALE, h: h, variant: i % 2 === 0 ? 'short' : 'tall'
        });
      }
    } else {
      // Pterodactyl
      const flyH = Math.random() < 0.5
        ? GROUND_Y - 80 * SCALE   // low flying
        : GROUND_Y - 130 * SCALE; // high flying
      obstacles.push({
        type: 'ptero', x: W + 20, y: flyH,
        w: 40 * SCALE, h: 25 * SCALE,
        wingFrame: 0, wingTimer: 0
      });
    }
  }

  // === BACKGROUND ===
  let stars = [];
  let mountains = [];
  let groundTex = [];
  let moonX = 0, moonY = 0;

  function initBackground() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * (GROUND_Y - 40),
        size: (0.5 + Math.random() * 2) * SCALE,
        brightness: 0.3 + Math.random() * 0.7,
        twinkleSpeed: 0.02 + Math.random() * 0.04,
        twinklePhase: Math.random() * Math.PI * 2,
      });
    }
    moonX = W * 0.75;
    moonY = H * 0.15;
    mountains = [];
    // Far mountains
    for (let i = 0; i < 12; i++) {
      mountains.push({
        x: i * W / 5 - W * 0.1,
        h: (60 + Math.random() * 80) * SCALE,
        w: (100 + Math.random() * 120) * SCALE,
        layer: 0,
        color: 'rgba(20, 15, 40, 0.8)'
      });
    }
    // Near mountains
    for (let i = 0; i < 15; i++) {
      mountains.push({
        x: i * W / 6 - W * 0.1,
        h: (40 + Math.random() * 50) * SCALE,
        w: (70 + Math.random() * 80) * SCALE,
        layer: 1,
        color: 'rgba(30, 20, 50, 0.9)'
      });
    }
    groundTex = [];
    for (let i = 0; i < 200; i++) {
      groundTex.push({
        x: Math.random() * W * 3,
        h: (1 + Math.random() * 4) * SCALE,
        w: (2 + Math.random() * 6) * SCALE,
      });
    }
  }

  // === SCORING ===
  function saveHighScore() {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('dinoRunnerHighScore', highScore);
    }
  }

  // === INIT ===
  function initGame() {
    score = 0;
    speed = CONFIG.initialSpeed;
    frameCount = 0;
    lastMilestone = 0;
    milestoneFlashTimer = 0;
    screenFlashTimer = 0;
    dayNightTimer = 0;
    obstacles = [];
    obstacleTimer = 0;
    dustParticles = [];
    initDino();
    initBackground();
  }

  // === INPUT ===
  let touchStartY = 0;
  let inputHandled = false;

  function handleJump() {
    if (gameState === STATE.START) {
      gameState = STATE.PLAYING;
      initGame();
      gameState = STATE.PLAYING;
      return;
    }
    if (gameState === STATE.GAMEOVER) {
      if (frameCount > 30) {
        gameState = STATE.PLAYING;
        initGame();
        gameState = STATE.PLAYING;
      }
      return;
    }
    if (gameState === STATE.PLAYING) {
      if (dino.grounded) {
        dino.vy = CONFIG.jumpForce * SCALE;
        dino.grounded = false;
        dino.jumps = 1;
        dino.ducking = false;
        dino.stretch = 1.2;
        dino.squash = 0.8;
      } else if (dino.jumps < 2) {
        dino.vy = CONFIG.doubleJumpForce * SCALE;
        dino.jumps = 2;
        dino.stretch = 1.15;
        dino.squash = 0.85;
      }
    }
  }

  function handleDuck(start) {
    if (gameState !== STATE.PLAYING) return;
    if (start) {
      dino.ducking = true;
      if (!dino.grounded) {
        dino.vy = Math.max(dino.vy, 4 * SCALE);
      }
    } else {
      dino.ducking = false;
    }
  }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      handleJump();
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      handleDuck(true);
    }
  });
  document.addEventListener('keyup', function(e) {
    if (e.code === 'ArrowDown') {
      handleDuck(false);
    }
  });

  // Touch
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    touchStartY = t.clientY;
    inputHandled = false;
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (inputHandled) return;
    const t = e.touches[0];
    const dy = t.clientY - touchStartY;
    if (dy > 30) {
      handleDuck(true);
      inputHandled = true;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (dino.ducking) {
      handleDuck(false);
    }
    if (!inputHandled) {
      handleJump();
    }
    inputHandled = false;
  }, { passive: false });

  // Mouse
  canvas.addEventListener('mousedown', function(e) {
    e.preventDefault();
    handleJump();
  });

  // === COLLISION ===
  function checkCollision(a, b) {
    const pad = 4 * SCALE;
    return a.x + pad < b.x + b.w - pad &&
           a.x + a.w - pad > b.x + pad &&
           a.y + pad < b.y + b.h - pad &&
           a.y + a.h - pad > b.y + pad;
  }

  // === UPDATE ===
  function update() {
    frameCount++;

    if (gameState !== STATE.PLAYING) {
      // Idle animation for start screen
      dino.idleBob = Math.sin(frameCount * 0.05) * 3 * SCALE;
      dino.legTimer++;
      if (dino.legTimer > 15) {
        dino.legTimer = 0;
        dino.legFrame = 1 - dino.legFrame;
      }
      // Twinkle stars
      for (let s of stars) {
        s.twinklePhase += s.twinkleSpeed;
      }
      return;
    }

    // Speed
    speed = Math.min(CONFIG.maxSpeed, CONFIG.initialSpeed + score * CONFIG.speedIncrement);
    const spd = speed * SCALE;

    // Score
    score++;
    if (score % 100 === 0 && score !== lastMilestone) {
      lastMilestone = score;
      milestoneFlashTimer = 30;
    }
    if (score % 500 === 0 && score > 0) {
      screenFlashTimer = 15;
      dayNightTimer = 60;
    }

    // Dino physics
    if (!dino.grounded) {
      let grav = CONFIG.gravity * SCALE;
      if (dino.ducking) grav *= 1.8;
      dino.vy += grav;
      dino.y += dino.vy;

      if (dino.y >= GROUND_Y - dino.h) {
        dino.y = GROUND_Y - dino.h;
        dino.vy = 0;
        dino.grounded = true;
        dino.jumps = 0;
        dino.squash = 1.2;
        dino.stretch = 0.85;
        spawnDust();
      }
    }

    // Squash/stretch interpolate back to 1
    dino.squash += (1 - dino.squash) * 0.15;
    dino.stretch += (1 - dino.stretch) * 0.15;

    // Ducking dimensions
    if (dino.ducking) {
      dino.h = dino.duckH;
      dino.w = dino.normalW * 1.3;
      if (dino.grounded) dino.y = GROUND_Y - dino.h;
    } else {
      dino.h = dino.normalH;
      dino.w = dino.normalW;
    }

    // Running animation
    if (dino.grounded) {
      dino.legTimer++;
      const legSpeed = Math.max(3, 10 - speed);
      if (dino.legTimer > legSpeed) {
        dino.legTimer = 0;
        dino.legFrame = 1 - dino.legFrame;
      }
    }

    // Obstacles
    obstacleTimer--;
    if (obstacleTimer <= 0) {
      spawnObstacle();
      const minGap = Math.max(40, 80 - speed * 3);
      const maxGap = Math.max(60, 120 - speed * 2);
      obstacleTimer = minGap + Math.random() * (maxGap - minGap);
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const obs = obstacles[i];
      obs.x -= spd;

      if (obs.type === 'ptero') {
        obs.wingTimer++;
        if (obs.wingTimer > 8) {
          obs.wingTimer = 0;
          obs.wingFrame = 1 - obs.wingFrame;
        }
      }

      if (obs.x + obs.w < -20) {
        obstacles.splice(i, 1);
        continue;
      }

      // Collision
      const dinoBox = { x: dino.x, y: dino.y, w: dino.w, h: dino.h };
      if (checkCollision(dinoBox, obs)) {
        gameState = STATE.GAMEOVER;
        saveHighScore();
        frameCount = 0;
        return;
      }
    }

    // Dust particles
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const p = dustParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1 * SCALE;
      p.life -= 0.04;
      if (p.life <= 0) dustParticles.splice(i, 1);
    }

    // Background scroll
    const farSpeed = spd * 0.15;
    const nearSpeed = spd * 0.35;
    for (let m of mountains) {
      const ms = m.layer === 0 ? farSpeed : nearSpeed;
      m.x -= ms;
      if (m.x + m.w < -50) {
        m.x = W + Math.random() * 100;
        m.h = ((m.layer === 0 ? 60 : 40) + Math.random() * (m.layer === 0 ? 80 : 50)) * SCALE;
      }
    }

    // Stars parallax
    for (let s of stars) {
      s.x -= spd * 0.05;
      s.twinklePhase += s.twinkleSpeed;
      if (s.x < -5) s.x = W + Math.random() * 20;
    }
    moonX -= spd * 0.02;
    if (moonX < -60) moonX = W + 60;

    // Ground texture scroll
    for (let g of groundTex) {
      g.x -= spd;
      if (g.x < -20) g.x = W + Math.random() * W;
    }

    // Timers
    if (milestoneFlashTimer > 0) milestoneFlashTimer--;
    if (screenFlashTimer > 0) screenFlashTimer--;
    if (dayNightTimer > 0) dayNightTimer--;
  }

  // === DRAW ===
  function drawSky() {
    // Gradient sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    if (dayNightTimer > 0) {
      const t = dayNightTimer / 60;
      const r = Math.floor(20 + 40 * t);
      const g = Math.floor(15 + 30 * t);
      const b = Math.floor(60 + 60 * t);
      skyGrad.addColorStop(0, `rgb(${r},${g},${b})`);
      skyGrad.addColorStop(1, `rgb(${Math.floor(10+20*t)},${Math.floor(10+15*t)},${Math.floor(30+30*t)})`);
    } else {
      skyGrad.addColorStop(0, '#0a0a1a');
      skyGrad.addColorStop(1, '#15102a');
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, GROUND_Y);
  }

  function drawStars() {
    for (let s of stars) {
      const twinkle = 0.5 + 0.5 * Math.sin(s.twinklePhase);
      const alpha = s.brightness * twinkle;
      ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawMoon() {
    ctx.fillStyle = 'rgba(220, 215, 200, 0.9)';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 25 * SCALE, 0, Math.PI * 2);
    ctx.fill();
    // Moon crater
    ctx.fillStyle = 'rgba(180, 175, 160, 0.4)';
    ctx.beginPath();
    ctx.arc(moonX - 6 * SCALE, moonY - 4 * SCALE, 5 * SCALE, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX + 8 * SCALE, moonY + 6 * SCALE, 3 * SCALE, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    const glow = ctx.createRadialGradient(moonX, moonY, 20 * SCALE, moonX, moonY, 60 * SCALE);
    glow.addColorStop(0, 'rgba(200, 195, 180, 0.1)');
    glow.addColorStop(1, 'rgba(200, 195, 180, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 60 * SCALE, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMountains() {
    for (let m of mountains) {
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.moveTo(m.x, GROUND_Y);
      ctx.lineTo(m.x + m.w * 0.5, GROUND_Y - m.h);
      ctx.lineTo(m.x + m.w, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawGround() {
    // Ground fill
    ctx.fillStyle = '#1a1530';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // Ground line
    ctx.strokeStyle = '#3a2f5a';
    ctx.lineWidth = 2 * SCALE;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    // Texture bumps
    ctx.fillStyle = '#2a2545';
    for (let g of groundTex) {
      if (g.x > -20 && g.x < W + 20) {
        ctx.fillRect(g.x, GROUND_Y + 4 * SCALE + Math.random(), g.w, g.h);
      }
    }
  }

  function drawDino() {
    ctx.save();
    const cx = dino.x + dino.w / 2;
    const cy = dino.y + dino.h;
    ctx.translate(cx, cy);
    ctx.scale(dino.squash, dino.stretch);
    ctx.translate(-cx, -cy);

    const x = dino.x;
    let y = dino.y;
    if (gameState === STATE.START) y += dino.idleBob;

    const s = SCALE;

    if (dino.ducking) {
      // Ducking dino - wider, shorter
      // Body
      ctx.fillStyle = '#5dba47';
      ctx.fillRect(x, y + 4 * s, dino.w, dino.h - 8 * s);

      // Head (extends forward)
      ctx.fillRect(x + dino.w - 5 * s, y, 18 * s, dino.h - 4 * s);

      // Eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + dino.w + 6 * s, y + 4 * s, 4 * s, 4 * s);
      ctx.fillStyle = '#111';
      ctx.fillRect(x + dino.w + 8 * s, y + 5 * s, 2 * s, 3 * s);

      // Legs
      ctx.fillStyle = '#4a9e38';
      if (dino.legFrame === 0) {
        ctx.fillRect(x + 8 * s, y + dino.h - 8 * s, 6 * s, 8 * s);
        ctx.fillRect(x + dino.w - 16 * s, y + dino.h - 6 * s, 6 * s, 6 * s);
      } else {
        ctx.fillRect(x + 8 * s, y + dino.h - 6 * s, 6 * s, 6 * s);
        ctx.fillRect(x + dino.w - 16 * s, y + dino.h - 8 * s, 6 * s, 8 * s);
      }
    } else {
      // Normal dino

      // Body
      ctx.fillStyle = '#5dba47';
      const bodyW = 24 * s;
      const bodyH = 28 * s;
      const bodyX = x + (dino.w - bodyW) / 2;
      const bodyY = y + 10 * s;
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);

      // Head
      const headW = 22 * s;
      const headH = 18 * s;
      const headX = bodyX + bodyW - 8 * s;
      const headY = y;
      ctx.fillRect(headX, headY, headW, headH);

      // Jaw (slight opening)
      ctx.fillStyle = '#4a9e38';
      ctx.fillRect(headX + 4 * s, headY + headH - 2 * s, headW - 4 * s, 4 * s);

      // Eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(headX + headW - 10 * s, headY + 4 * s, 5 * s, 5 * s);
      ctx.fillStyle = '#111';
      ctx.fillRect(headX + headW - 8 * s, headY + 5 * s, 3 * s, 4 * s);

      // Arm (small)
      ctx.fillStyle = '#4a9e38';
      ctx.fillRect(bodyX + bodyW - 4 * s, bodyY + 10 * s, 8 * s, 4 * s);
      ctx.fillRect(bodyX + bodyW + 2 * s, bodyY + 12 * s, 3 * s, 5 * s);

      // Tail
      ctx.fillStyle = '#5dba47';
      ctx.beginPath();
      ctx.moveTo(bodyX, bodyY + 4 * s);
      ctx.lineTo(bodyX - 10 * s, bodyY);
      ctx.lineTo(bodyX - 8 * s, bodyY + 8 * s);
      ctx.closePath();
      ctx.fill();

      // Legs
      ctx.fillStyle = '#4a9e38';
      const legW = 7 * s;
      const legH = 12 * s;
      const legY = bodyY + bodyH;

      if (!dino.grounded) {
        // In air - legs tucked
        ctx.fillRect(bodyX + 3 * s, legY - 2 * s, legW, legH - 4 * s);
        ctx.fillRect(bodyX + bodyW - legW - 3 * s, legY - 2 * s, legW, legH - 4 * s);
      } else if (dino.legFrame === 0) {
        // Left forward, right back
        ctx.fillRect(bodyX + 2 * s, legY, legW, legH);
        ctx.fillRect(bodyX + bodyW - legW - 2 * s, legY - 2 * s, legW, legH - 2 * s);
        // Feet
        ctx.fillRect(bodyX + 2 * s, legY + legH - 3 * s, legW + 3 * s, 3 * s);
      } else {
        // Right forward, left back
        ctx.fillRect(bodyX + 2 * s, legY - 2 * s, legW, legH - 2 * s);
        ctx.fillRect(bodyX + bodyW - legW - 2 * s, legY, legW, legH);
        // Feet
        ctx.fillRect(bodyX + bodyW - legW - 2 * s, legY + legH - 3 * s, legW + 3 * s, 3 * s);
      }

      // Darker belly
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(bodyX + 2 * s, bodyY + bodyH - 10 * s, bodyW - 4 * s, 8 * s);
    }

    ctx.restore();
  }

  function drawCactus(obs) {
    const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
    const s = SCALE;

    // Main body
    ctx.fillStyle = '#2d8a20';
    ctx.fillRect(x, y, w, h);

    // Darker edges
    ctx.fillStyle = '#1e6b15';
    ctx.fillRect(x, y, 3 * s, h);
    ctx.fillRect(x + w - 3 * s, y, 3 * s, h);

    // Top
    ctx.fillStyle = '#35a028';
    ctx.fillRect(x + 2 * s, y, w - 4 * s, 4 * s);

    // Arms for tall cacti
    if (obs.variant === 'tall' && h > 40 * s) {
      ctx.fillStyle = '#2d8a20';
      // Left arm
      ctx.fillRect(x - 8 * s, y + h * 0.3, 10 * s, 5 * s);
      ctx.fillRect(x - 8 * s, y + h * 0.15, 5 * s, h * 0.2);
      // Right arm
      ctx.fillRect(x + w - 2 * s, y + h * 0.45, 10 * s, 5 * s);
      ctx.fillRect(x + w + 3 * s, y + h * 0.25, 5 * s, h * 0.25);

      // Arm edges
      ctx.fillStyle = '#1e6b15';
      ctx.fillRect(x - 8 * s, y + h * 0.15, 2 * s, h * 0.2);
      ctx.fillRect(x + w + 6 * s, y + h * 0.25, 2 * s, h * 0.25);
    }

    // Spines (tiny dots)
    ctx.fillStyle = '#44cc33';
    for (let i = 0; i < 4; i++) {
      const sy = y + h * 0.2 + i * h * 0.2;
      ctx.fillRect(x - 1 * s, sy, 2 * s, 2 * s);
      ctx.fillRect(x + w - 1 * s, sy, 2 * s, 2 * s);
    }
  }

  function drawPtero(obs) {
    const x = obs.x, y = obs.y, w = obs.w, h = obs.h;
    const s = SCALE;
    const cx = x + w / 2;
    const cy = y + h / 2;

    // Body
    ctx.fillStyle = '#8855aa';
    ctx.beginPath();
    ctx.ellipse(cx, cy, w * 0.35, h * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#9966bb';
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.3, cy - h * 0.05, w * 0.15, h * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#cc8844';
    ctx.beginPath();
    ctx.moveTo(cx + w * 0.42, cy - h * 0.1);
    ctx.lineTo(cx + w * 0.58, cy);
    ctx.lineTo(cx + w * 0.42, cy + h * 0.05);
    ctx.closePath();
    ctx.fill();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + w * 0.32, cy - h * 0.1, 2 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(cx + w * 0.33, cy - h * 0.09, 1 * s, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#7744aa';
    if (obs.wingFrame === 0) {
      // Wings up
      ctx.beginPath();
      ctx.moveTo(cx - w * 0.15, cy);
      ctx.lineTo(cx - w * 0.05, cy - h * 0.6);
      ctx.lineTo(cx + w * 0.15, cy - h * 0.5);
      ctx.lineTo(cx + w * 0.1, cy);
      ctx.closePath();
      ctx.fill();
    } else {
      // Wings down
      ctx.beginPath();
      ctx.moveTo(cx - w * 0.15, cy);
      ctx.lineTo(cx - w * 0.05, cy + h * 0.5);
      ctx.lineTo(cx + w * 0.15, cy + h * 0.4);
      ctx.lineTo(cx + w * 0.1, cy);
      ctx.closePath();
      ctx.fill();
    }

    // Tail
    ctx.fillStyle = '#7744aa';
    ctx.beginPath();
    ctx.moveTo(cx - w * 0.3, cy - h * 0.05);
    ctx.lineTo(cx - w * 0.55, cy - h * 0.15);
    ctx.lineTo(cx - w * 0.5, cy + h * 0.1);
    ctx.lineTo(cx - w * 0.3, cy + h * 0.08);
    ctx.closePath();
    ctx.fill();
  }

  function drawDust() {
    for (let p of dustParticles) {
      ctx.fillStyle = `rgba(180, 170, 150, ${p.life * 0.6})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawScore() {
    const s = SCALE;
    ctx.textAlign = 'right';
    ctx.font = `bold ${16 * s}px 'Courier New', monospace`;

    // Milestone flash
    if (milestoneFlashTimer > 0) {
      const alpha = milestoneFlashTimer / 30;
      ctx.fillStyle = `rgba(255, 220, 100, ${alpha})`;
      ctx.font = `bold ${24 * s}px 'Courier New', monospace`;
      ctx.fillText(String(score).padStart(5, '0'), W - 20, 40 * s);
    } else {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.fillText(String(score).padStart(5, '0'), W - 20, 40 * s);
    }

    // High score
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.font = `${12 * s}px 'Courier New', monospace`;
    ctx.fillText('HI ' + String(highScore).padStart(5, '0'), W - 20, 60 * s);
  }

  function drawStartScreen() {
    const s = SCALE;
    ctx.textAlign = 'center';

    // Title
    ctx.fillStyle = '#5dba47';
    ctx.font = `bold ${36 * s}px 'Courier New', monospace`;
    ctx.fillText('DINO RUNNER', W / 2, H * 0.28);

    // Subtitle line
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = `${13 * s}px 'Courier New', monospace`;
    ctx.fillText('Chrome Dino Style', W / 2, H * 0.28 + 28 * s);

    // Dino is drawn at its normal position

    // Tap to start (pulsing)
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.06);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + pulse * 0.5})`;
    ctx.font = `bold ${18 * s}px 'Courier New', monospace`;
    ctx.fillText('TAP TO START', W / 2, H * 0.70);

    // Controls
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.font = `${11 * s}px 'Courier New', monospace`;
    ctx.fillText('SPACE / TAP = Jump  |  DOWN / SWIPE = Duck', W / 2, H * 0.70 + 28 * s);
    ctx.fillText('Double tap for double jump!', W / 2, H * 0.70 + 48 * s);

    // High score
    if (highScore > 0) {
      ctx.fillStyle = 'rgba(255, 220, 100, 0.6)';
      ctx.font = `${13 * s}px 'Courier New', monospace`;
      ctx.fillText('HIGH SCORE: ' + String(highScore).padStart(5, '0'), W / 2, H * 0.70 + 78 * s);
    }
  }

  function drawGameOver() {
    const s = SCALE;
    ctx.textAlign = 'center';

    // Overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, W, H);

    // Game Over text
    ctx.fillStyle = '#ff4444';
    ctx.font = `bold ${32 * s}px 'Courier New', monospace`;
    ctx.fillText('GAME OVER', W / 2, H * 0.35);

    // Score
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.font = `bold ${20 * s}px 'Courier New', monospace`;
    ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), W / 2, H * 0.45);

    // High score
    const isNew = score >= highScore && score > 0;
    if (isNew) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = `bold ${16 * s}px 'Courier New', monospace`;
      ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.52);
    } else {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.font = `${14 * s}px 'Courier New', monospace`;
      ctx.fillText('HIGH: ' + String(highScore).padStart(5, '0'), W / 2, H * 0.52);
    }

    // Retry
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.08);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + pulse * 0.5})`;
    ctx.font = `bold ${16 * s}px 'Courier New', monospace`;
    ctx.fillText('TAP TO RETRY', W / 2, H * 0.64);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawSky();
    drawStars();
    drawMoon();
    drawMountains();
    drawGround();

    // Obstacles
    for (let obs of obstacles) {
      if (obs.type === 'cactus') drawCactus(obs);
      else if (obs.type === 'ptero') drawPtero(obs);
    }

    drawDust();
    drawDino();

    if (gameState === STATE.PLAYING) {
      drawScore();
    }

    // Screen flash (500-point milestone)
    if (screenFlashTimer > 0) {
      const alpha = screenFlashTimer / 15 * 0.4;
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (gameState === STATE.START) drawStartScreen();
    if (gameState === STATE.GAMEOVER) drawGameOver();
  }

  // === GAME LOOP ===
  initGame();
  gameState = STATE.START;

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
