<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Lucky Money - Lunar New Year</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  body{
    min-height:100vh;
    background:#0a0a1a;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(180,20,20,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(180,100,0,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(120,10,10,0.15) 0%, transparent 70%);
    font-family:"Segoe UI",Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
    overflow-x:hidden;
    position:relative;
  }

  .petal{
    position:fixed;
    top:-30px;
    width:14px;
    height:20px;
    background:radial-gradient(ellipse at 50% 40%, #ffb7c5, #ff6b9d88);
    border-radius:50% 0 50% 0;
    opacity:0.7;
    animation:petalFall linear infinite;
    pointer-events:none;
    z-index:0;
  }
  .petal:nth-child(1){left:5%;animation-duration:9s;animation-delay:0s;width:12px;height:18px}
  .petal:nth-child(2){left:14%;animation-duration:12s;animation-delay:1.5s;width:16px;height:22px}
  .petal:nth-child(3){left:24%;animation-duration:8s;animation-delay:3s;width:10px;height:16px}
  .petal:nth-child(4){left:35%;animation-duration:14s;animation-delay:0.8s;width:14px;height:20px}
  .petal:nth-child(5){left:47%;animation-duration:10s;animation-delay:4.5s;width:18px;height:24px}
  .petal:nth-child(6){left:58%;animation-duration:11s;animation-delay:2s;width:12px;height:18px}
  .petal:nth-child(7){left:68%;animation-duration:7s;animation-delay:6s;width:14px;height:20px}
  .petal:nth-child(8){left:77%;animation-duration:13s;animation-delay:1s;width:10px;height:16px}
  .petal:nth-child(9){left:86%;animation-duration:9s;animation-delay:3.5s;width:16px;height:22px}
  .petal:nth-child(10){left:94%;animation-duration:11s;animation-delay:5s;width:12px;height:18px}

  @keyframes petalFall{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0.7}
    25%{transform:translateY(27vh) translateX(18px) rotate(45deg);opacity:0.8}
    50%{transform:translateY(55vh) translateX(-12px) rotate(90deg);opacity:0.6}
    75%{transform:translateY(82vh) translateX(20px) rotate(135deg);opacity:0.5}
    100%{transform:translateY(110vh) translateX(-8px) rotate(180deg);opacity:0}
  }

  .back-btn{
    position:fixed;
    top:14px;left:14px;
    z-index:100;
    background:rgba(180,20,20,0.75);
    color:#ffd700;
    text-decoration:none;
    padding:7px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    border:1px solid rgba(255,215,0,0.35);
    backdrop-filter:blur(6px);
    transition:background 0.2s,transform 0.15s;
  }
  .back-btn:hover{background:rgba(200,30,30,0.9);transform:scale(1.05)}

  .title-section{
    text-align:center;
    margin:60px 0 28px;
    z-index:1;
    position:relative;
  }
  .title{
    font-size:clamp(26px,6vw,42px);
    font-weight:900;
    background:linear-gradient(135deg,#ffd700,#dc2626,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(255,80,0,0.5));
    letter-spacing:1px;
    animation:titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse{
    0%,100%{filter:drop-shadow(0 2px 8px rgba(255,80,0,0.5))}
    50%{filter:drop-shadow(0 2px 20px rgba(255,200,0,0.8))}
  }
  .subtitle{
    color:#ffd700cc;
    font-size:clamp(13px,3.5vw,17px);
    margin-top:8px;
    font-weight:500;
    letter-spacing:0.3px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    max-width:480px;
    width:100%;
    z-index:1;
    position:relative;
  }

  .box-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    position:relative;
  }
  .box-wrapper.opened{cursor:default;pointer-events:none}

  .box-scene{
    width:100%;
    padding-top:110%;
    position:relative;
    perspective:600px;
  }
  .box-inner{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
  }

  .box-body{
    width:82%;
    height:62%;
    border-radius:6px 6px 10px 10px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15);
    transition:transform 0.2s;
    overflow:hidden;
  }
  .box-body::before{
    content:"";
    position:absolute;
    top:0;bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:18%;
    background:rgba(255,215,0,0.25);
    border-left:1px solid rgba(255,215,0,0.5);
    border-right:1px solid rgba(255,215,0,0.5);
  }
  .box-body::after{
    content:"\2726";
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:22px;
    color:#ffd700;
    opacity:0.9;
    text-shadow:0 0 8px rgba(255,215,0,0.8);
  }

  .box-lid{
    width:88%;
    height:28%;
    border-radius:6px;
    margin-bottom:-2px;
    position:relative;
    transform-origin:top center;
    transform:rotateX(0deg);
    transition:transform 0.55s cubic-bezier(0.25,1.6,0.5,1),opacity 0.4s;
    box-shadow:0 -3px 12px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
    z-index:2;
    overflow:hidden;
  }
  .box-lid::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(90deg,transparent 43%,rgba(255,215,0,0.3) 43%,rgba(255,215,0,0.3) 57%,transparent 57%),
      linear-gradient(0deg,transparent 43%,rgba(255,215,0,0.3) 43%,rgba(255,215,0,0.3) 57%,transparent 57%);
  }
  .box-lid::after{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:40%;
    background:linear-gradient(180deg,rgba(255,255,255,0.25),transparent);
    border-radius:6px 6px 0 0;
  }

  .prize-float{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:clamp(32px,8vw,52px);
    z-index:10;
    animation:none;
    pointer-events:none;
  }

  .box-red .box-body{background:linear-gradient(135deg,#7f1d1d,#b91c1c)}
  .box-red .box-lid{background:linear-gradient(135deg,#b91c1c,#dc2626)}
  .box-gold .box-body{background:linear-gradient(135deg,#78350f,#b45309)}
  .box-gold .box-lid{background:linear-gradient(135deg,#b45309,#d97706)}
  .box-deepred .box-body{background:linear-gradient(135deg,#450a0a,#991b1b)}
  .box-deepred .box-lid{background:linear-gradient(135deg,#991b1b,#b91c1c)}
  .box-orangered .box-body{background:linear-gradient(135deg,#7c2d12,#c2410c)}
  .box-orangered .box-lid{background:linear-gradient(135deg,#c2410c,#ea580c)}
  .box-crimson .box-body{background:linear-gradient(135deg,#881337,#be123c)}
  .box-crimson .box-lid{background:linear-gradient(135deg,#be123c,#e11d48)}
  .box-maroon .box-body{background:linear-gradient(135deg,#4c0519,#9f1239)}
  .box-maroon .box-lid{background:linear-gradient(135deg,#9f1239,#be185d)}

  .box-wrapper:not(.opened) .box-scene{animation:bob 2.5s ease-in-out infinite}
  .box-wrapper:not(.opened):nth-child(2) .box-scene{animation-delay:0.3s}
  .box-wrapper:not(.opened):nth-child(3) .box-scene{animation-delay:0.6s}
  .box-wrapper:not(.opened):nth-child(4) .box-scene{animation-delay:0.9s}
  .box-wrapper:not(.opened):nth-child(5) .box-scene{animation-delay:1.2s}
  .box-wrapper:not(.opened):nth-child(6) .box-scene{animation-delay:1.5s}

  @keyframes bob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-7px)}
  }

  .box-wrapper:not(.opened):hover .box-scene{
    animation:shake 0.4s ease-in-out;
  }
  @keyframes shake{
    0%,100%{transform:rotate(0deg)}
    20%{transform:rotate(-4deg)}
    40%{transform:rotate(4deg)}
    60%{transform:rotate(-3deg)}
    80%{transform:rotate(3deg)}
  }

  .box-wrapper.opening .box-lid{
    transform:rotateX(-130deg);
    opacity:0.6;
  }

  @keyframes prizeFloat{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0}
    30%{transform:translate(-50%,-120%) scale(1.3) rotate(5deg);opacity:1}
    60%{transform:translate(-50%,-160%) scale(1.1) rotate(-3deg);opacity:1}
    85%{transform:translate(-50%,-170%) scale(1) rotate(0deg);opacity:1}
    100%{transform:translate(-50%,-180%) scale(0.9) rotate(0deg);opacity:0}
  }

  @keyframes sparkleRing{
    0%{transform:translate(-50%,-50%) scale(0);opacity:1}
    100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}
  }
  .sparkle-ring{
    position:absolute;
    top:50%;left:50%;
    width:60px;height:60px;
    border-radius:50%;
    border:3px solid #ffd700;
    pointer-events:none;
    z-index:9;
  }

  .instruction{
    color:#ffd70099;
    font-size:14px;
    margin-top:20px;
    text-align:center;
    z-index:1;
    position:relative;
    letter-spacing:0.5px;
  }

  .result-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,0,15,0.85);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s;
  }
  .result-overlay.show{
    opacity:1;
    pointer-events:all;
  }

  .result-card{
    background:linear-gradient(160deg,#1a0505,#2d0a0a,#1a0a00);
    border:2px solid rgba(255,215,0,0.4);
    border-radius:24px;
    padding:36px 28px 28px;
    text-align:center;
    max-width:340px;
    width:88%;
    box-shadow:0 0 60px rgba(200,30,30,0.4),0 0 120px rgba(255,150,0,0.1);
    animation:cardEntry 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    overflow:hidden;
  }
  @keyframes cardEntry{
    0%{transform:scale(0.6) translateY(40px);opacity:0}
    100%{transform:scale(1) translateY(0);opacity:1}
  }

  .result-glow{
    position:absolute;
    top:-40px;left:50%;
    transform:translateX(-50%);
    width:200px;height:200px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,215,0,0.25) 0%,transparent 70%);
    pointer-events:none;
  }

  .result-emoji{
    display:block;
    font-size:clamp(60px,15vw,90px);
    margin-bottom:12px;
    animation:emojiPop 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    filter:drop-shadow(0 0 12px rgba(255,200,0,0.7));
  }
  @keyframes emojiPop{
    0%{transform:scale(0) rotate(-20deg)}
    100%{transform:scale(1) rotate(0deg)}
  }

  .result-tier{
    font-size:12px;
    font-weight:800;
    letter-spacing:2.5px;
    text-transform:uppercase;
    margin-bottom:8px;
    padding:3px 12px;
    border-radius:20px;
    display:inline-block;
  }
  .tier-legendary .result-tier{background:linear-gradient(90deg,#ffd700,#ff8c00);color:#1a0000}
  .tier-epic .result-tier{background:linear-gradient(90deg,#a855f7,#7c3aed);color:#fff}
  .tier-rare .result-tier{background:linear-gradient(90deg,#3b82f6,#06b6d4);color:#fff}
  .tier-common .result-tier{background:linear-gradient(90deg,#6b7280,#4b5563);color:#fff}

  .result-label{
    font-size:clamp(20px,5vw,28px);
    font-weight:900;
    background:linear-gradient(135deg,#ffd700,#dc2626,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin:10px 0 6px;
  }
  .result-desc{
    color:#ffcca0cc;
    font-size:14px;
    line-height:1.6;
    margin-bottom:24px;
  }

  .play-again-btn{
    background:linear-gradient(135deg,#7f1d1d,#b91c1c,#dc2626);
    color:#ffd700;
    border:2px solid rgba(255,215,0,0.5);
    padding:12px 32px;
    border-radius:30px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    letter-spacing:0.5px;
    transition:transform 0.15s,box-shadow 0.15s;
    box-shadow:0 4px 18px rgba(180,0,0,0.5);
    width:100%;
  }
  .play-again-btn:hover{transform:scale(1.04);box-shadow:0 6px 28px rgba(200,20,20,0.7)}
  .play-again-btn:active{transform:scale(0.97)}

  .confetti-piece{
    position:fixed;
    width:10px;
    height:10px;
    border-radius:2px;
    top:-20px;
    pointer-events:none;
    z-index:300;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) translateX(0) rotate(0deg) scale(1);opacity:1}
    70%{opacity:1}
    100%{transform:translateY(110vh) translateX(var(--drift)) rotate(var(--spin)) scale(0.5);opacity:0}
  }

  .star{
    position:fixed;
    border-radius:50%;
    background:#fff;
    pointer-events:none;
    animation:twinkle ease-in-out infinite;
    z-index:0;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15;transform:scale(1)}
    50%{opacity:0.8;transform:scale(1.4)}
  }
</style>
</head>
<body>

<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>

<a href="../index.html" class="back-btn">← Back</a>

<div class="title-section">
  <h1 class="title">🧧 Lucky Money</h1>
  <p class="subtitle">Pick a red envelope and receive your Lunar New Year lucky money!</p>
</div>

<div class="grid" id="grid"></div>

<p class="instruction" id="instruction">Tap an envelope to receive your lucky money</p>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card" id="resultCard" style="position:relative">
    <div class="result-glow" id="resultGlow"></div>
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-tier" id="resultTier"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="play-again-btn" id="playAgainBtn">Open Again 🧧</button>
  </div>
</div>

<script>
  var PRIZES = [
    { emoji: '🏨',  label: 'Lucky Stay Voucher 500K!',  description: 'A 500K New Year room booking voucher! Book at ibookingu5.myghs.com/demo — Code: LUCKY500K', tier: 'legendary' },
    { emoji: '🏷️', label: 'Room Discount 300K!',        description: 'A 300K lucky room discount! Use code ROOM300K at ibookingu5.myghs.com/demo',                tier: 'epic'      },
    { emoji: '🎫',  label: '15% Off Room Booking!',      description: 'Promo code LUNAR15OFF — 15% off any room at ibookingu5.myghs.com/demo',                     tier: 'rare'      },
    { emoji: '🎆',  label: 'Fireworks + 10% Off!',       description: 'Promo code BOOK10OFF — 10% off your stay at ibookingu5.myghs.com/demo',                     tier: 'rare'      },
    {emoji:"🍊",label:"200 Points",description:"Lucky golden tangerine!",tier:"common"},
    {emoji:"🌟",label:"100 Points",description:"Happy New Year!",tier:"common"}
  ];

  var TIER_WEIGHTS = {legendary:1,epic:3,rare:8,common:15};
  var TIER_LABELS  = {legendary:"✨ Legendary",epic:"💜 Epic",rare:"💙 Rare",common:"⚪ Common"};
  var BOX_COLORS   = ["red","gold","deepred","orangered","crimson","maroon"];

  function pickPrize() {
    var pool = [];
    PRIZES.forEach(function(p) {
      var w = TIER_WEIGHTS[p.tier] || 1;
      for (var i = 0; i < w; i++) pool.push(p);
    });
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function buildStars() {
    for (var i = 0; i < 35; i++) {
      var s = document.createElement("div");
      s.className = "star";
      var size = Math.random() * 2.5 + 0.5;
      s.style.cssText = "width:" + size + "px;height:" + size + "px;left:" + (Math.random() * 100) + "vw;top:" + (Math.random() * 100) + "vh;animation-duration:" + (2 + Math.random() * 3) + "s;animation-delay:" + (Math.random() * 4) + "s;";
      document.body.appendChild(s);
    }
  }

  var gameOver = false;

  function buildGrid() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    gameOver = false;
    document.getElementById("instruction").textContent = "Tap an envelope to receive your lucky money";
    BOX_COLORS.forEach(function(color, idx) {
      var wrapper = document.createElement("div");
      wrapper.className = "box-wrapper box-" + color;
      wrapper.innerHTML = '<div class="box-scene"><div class="box-inner"><div class="box-lid"></div><div class="box-body"></div><div class="prize-float" id="pf' + idx + '"></div></div></div>';
      wrapper.addEventListener("click", (function(w, i) {
        return function() { handleClick(w, i); };
      })(wrapper, idx));
      grid.appendChild(wrapper);
    });
  }

  function handleClick(wrapper, idx) {
    if (gameOver || wrapper.classList.contains("opened") || wrapper.classList.contains("opening")) return;
    gameOver = true;
    wrapper.classList.add("opening");
    var prize = pickPrize();
    var prizeEl = document.getElementById("pf" + idx);
    document.getElementById("instruction").textContent = "🎊 Congratulations!";
    setTimeout(function() {
      prizeEl.textContent = prize.emoji;
      prizeEl.style.animation = "prizeFloat 1.1s ease-out forwards";
      spawnSparkleRings(wrapper.querySelector(".box-inner"), prize.tier);
      setTimeout(function() {
        wrapper.classList.add("opened");
        showResult(prize);
      }, 900);
    }, 380);
  }

  function spawnSparkleRings(container, tier) {
    var colors = {legendary:"#ffd700",epic:"#a855f7",rare:"#3b82f6",common:"#9ca3af"};
    var c = colors[tier] || "#ffd700";
    for (var i = 0; i < 3; i++) {
      (function(delay) {
        setTimeout(function() {
          var ring = document.createElement("div");
          ring.className = "sparkle-ring";
          ring.style.cssText = "border-color:" + c + ";animation:sparkleRing 0.7s ease-out forwards;";
          container.appendChild(ring);
          setTimeout(function() { ring.remove(); }, 750);
        }, delay);
      })(i * 180);
    }
  }

  function showResult(prize) {
    var overlay = document.getElementById("resultOverlay");
    var card    = document.getElementById("resultCard");
    document.getElementById("resultEmoji").textContent = prize.emoji;
    document.getElementById("resultTier").textContent  = TIER_LABELS[prize.tier] || prize.tier;
    document.getElementById("resultLabel").textContent = prize.label;
    document.getElementById("resultDesc").textContent  = prize.description;
    card.className = card.className.replace(/tier-\w+/g, "").trim();
    card.classList.add("tier-" + prize.tier);
    var glowColors = {
      legendary:"rgba(255,215,0,0.4)",
      epic:"rgba(168,85,247,0.35)",
      rare:"rgba(59,130,246,0.3)",
      common:"rgba(100,100,100,0.2)"
    };
    document.getElementById("resultGlow").style.background =
      "radial-gradient(circle," + (glowColors[prize.tier] || glowColors.common) + " 0%,transparent 70%)";
    overlay.classList.add("show");
    if (prize.tier === "legendary" || prize.tier === "epic") launchConfetti(prize.tier);
  }

  function launchConfetti(tier) {
    var tetColors = ["#dc2626","#ffd700","#ea580c","#ff69b4","#b91c1c","#f59e0b","#ff4500","#ffb7c5"];
    var count = tier === "legendary" ? 120 : 70;
    for (var i = 0; i < count; i++) {
      (function(delay) {
        setTimeout(function() {
          var el    = document.createElement("div");
          el.className = "confetti-piece";
          var size  = 7 + Math.random() * 9;
          var color = tetColors[Math.floor(Math.random() * tetColors.length)];
          var left  = Math.random() * 100;
          var drift = (Math.random() - 0.5) * 200;
          var spin  = Math.random() * 720 - 360;
          var dur   = 2.2 + Math.random() * 1.8;
          var radius = Math.random() > 0.5 ? "2px" : "50%";
          el.style.cssText = "left:" + left + "vw;width:" + size + "px;height:" + (size * (0.4 + Math.random() * 0.8)) + "px;background:" + color + ";border-radius:" + radius + ";--drift:" + drift + "px;--spin:" + spin + "deg;animation-duration:" + dur + "s;animation-delay:" + (Math.random() * 0.6) + "s;";
          document.body.appendChild(el);
          setTimeout(function() { el.remove(); }, (dur + 0.7) * 1000);
        }, delay);
      })(i * 18);
    }
  }

  document.getElementById("playAgainBtn").addEventListener("click", function() {
    document.getElementById("resultOverlay").classList.remove("show");
    setTimeout(buildGrid, 300);
  });

  buildStars();
  buildGrid();
</script>
