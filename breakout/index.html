<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none}
#container{display:flex;flex-direction:column;align-items:center;height:100%;width:100%}
#topBar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;padding:8px 12px;z-index:10}
#backBtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#ccc;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:14px;text-decoration:none;transition:background .2s}
#backBtn:hover{background:rgba(255,255,255,.15);color:#fff}
#hud{display:flex;gap:16px;align-items:center;font-size:14px}
#scoreDisplay{font-weight:700;font-size:18px;color:#f0e68c;transition:transform .1s}
#scoreDisplay.pop{transform:scale(1.3)}
#livesDisplay{display:flex;gap:3px}
#levelDisplay{color:#8af;font-weight:600}
#canvasWrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:600px;position:relative}
canvas{display:block;border-radius:4px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:5}
#overlay.active{pointer-events:auto}
.overlayContent{text-align:center;padding:30px;border-radius:16px;background:rgba(10,10,26,.92);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}
.overlayContent h1{font-size:28px;margin-bottom:10px;background:linear-gradient(135deg,#f0e68c,#ffa500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlayContent p{color:#aaa;margin:6px 0;font-size:15px}
.overlayContent .big{font-size:22px;color:#fff;font-weight:700;margin:10px 0}
.overlayContent .hs{color:#f0e68c;font-size:14px;margin-top:4px}
.overlayContent .tapHint{color:#8af;margin-top:18px;font-size:16px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
<div id="container">
  <div id="topBar">
    <a id="backBtn" href="../index.html">&#8592; Back</a>
    <div id="hud">
      <span id="levelDisplay">Level 1</span>
      <span id="livesDisplay"></span>
      <span id="scoreDisplay">0</span>
    </div>
  </div>
  <div id="canvasWrap">
    <canvas id="gc"></canvas>
    <div id="overlay" class="active">
      <div class="overlayContent" id="overlayInner"></div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const scoreDisplay = document.getElementById('scoreDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const canvasWrap = document.getElementById('canvasWrap');

// --- Game Constants ---
const BRICK_ROWS = 5;
const BRICK_COLS = 8;
const BRICK_PAD = 4;
const BRICK_TOP_OFFSET = 50;
const PADDLE_HEIGHT = 14;
const BALL_RADIUS = 6;
const INITIAL_BALL_SPEED = 5;
const SPEED_INCREMENT = 0.12;
const MAX_BALL_SPEED = 12;
const POWERUP_CHANCE = 0.2;
const POWERUP_SPEED = 2.2;
const POWERUP_RADIUS = 10;
const POWERUP_DURATION = 10000;
const STAR_COUNT = 80;

const ROW_COLORS = [
  ['#ff4466','#ff6688'], // top row - 50pts
  ['#ff8844','#ffaa66'], // 40pts
  ['#ffcc33','#ffdd66'], // 30pts
  ['#44cc66','#66ee88'], // 20pts
  ['#4488ff','#66aaff'], // bottom row - 10pts
];
const ROW_POINTS = [50, 40, 30, 20, 10];

const POWERUP_TYPES = ['wide','multi','fire'];
const POWERUP_COLORS = {wide:'#44ff88',multi:'#4488ff',fire:'#ff4444'};

// --- Game State ---
let W, H, brickW, brickH;
let paddle, balls, bricks, powerups, particles, floatTexts;
let score, lives, level, highScore;
let gameState; // 'start','playing','paused','gameover','levelcomplete'
let stars = [];
let activePowerups = {wide:0, fire:0};
let animFrame;
let lastTime = 0;

// --- Resize ---
function resize() {
  const wrap = canvasWrap;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = Math.min(rect.width, 600);
  H = rect.height;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  brickW = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
  brickH = 18;
  if (paddle) {
    paddle.y = H - 40;
    paddle.x = Math.max(paddle.w/2, Math.min(W - paddle.w/2, paddle.x));
  }
}
window.addEventListener('resize', resize);

// --- Stars ---
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * 600,
      y: Math.random() * 900,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.5 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }
}

// --- Init ---
function initGame() {
  highScore = parseInt(localStorage.getItem('breakout_highscore')) || 0;
  score = 0;
  lives = 3;
  level = 1;
  activePowerups = {wide:0, fire:0};
  initStars();
  initLevel();
  updateHUD();
  showStartScreen();
}

function initLevel() {
  const pw = activePowerups.wide > Date.now() ? 120 : 80;
  paddle = {x: W/2, y: H - 40, w: pw, h: PADDLE_HEIGHT, targetX: W/2};
  balls = [];
  powerups = [];
  particles = [];
  floatTexts = [];
  createBricks();
  spawnBallOnPaddle();
}

function createBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      let alive = true;
      // higher levels can have gaps
      if (level > 1 && Math.random() < 0.08 * level) {
        // some random patterns for variety
      }
      // some bricks take 2 hits on higher levels
      let hp = 1;
      if (level >= 3 && r < 2 && Math.random() < 0.3) hp = 2;
      if (level >= 5 && r < 3 && Math.random() < 0.2) hp = 3;
      bricks.push({
        r, c,
        x: BRICK_PAD + c * (brickW + BRICK_PAD),
        y: BRICK_TOP_OFFSET + r * (brickH + BRICK_PAD),
        w: brickW,
        h: brickH,
        alive: true,
        hp,
        maxHp: hp,
        points: ROW_POINTS[r],
        color1: ROW_COLORS[r][0],
        color2: ROW_COLORS[r][1],
        hasPowerup: Math.random() < POWERUP_CHANCE,
        cracked: false,
        shakeTime: 0
      });
    }
  }
}

function spawnBallOnPaddle() {
  balls.push({
    x: paddle.x,
    y: paddle.y - BALL_RADIUS - paddle.h/2,
    vx: 0,
    vy: 0,
    speed: INITIAL_BALL_SPEED + (level - 1) * 0.3,
    onPaddle: true,
    fire: activePowerups.fire > Date.now(),
    trail: []
  });
}

// --- HUD ---
function updateHUD() {
  scoreDisplay.textContent = score;
  levelDisplay.textContent = 'Level ' + level;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '<span style="color:#ff4466;font-size:16px">&#9829;</span>';
  for (let i = lives; i < 3; i++) hearts += '<span style="color:#333;font-size:16px">&#9829;</span>';
  livesDisplay.innerHTML = hearts;
}

function popScore() {
  scoreDisplay.classList.add('pop');
  setTimeout(() => scoreDisplay.classList.remove('pop'), 150);
}

// --- Overlays ---
function showStartScreen() {
  gameState = 'start';
  overlay.classList.add('active');
  overlayInner.innerHTML = `
    <h1>BREAKOUT</h1>
    <p>Break all the bricks!</p>
    <p style="font-size:13px;color:#666;margin-top:8px">High Score: ${highScore}</p>
    <p class="tapHint">Tap to Launch</p>
  `;
}

function showGameOver() {
  gameState = 'gameover';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('breakout_highscore', highScore);
  }
  overlay.classList.add('active');
  overlayInner.innerHTML = `
    <h1>GAME OVER</h1>
    <p class="big">Score: ${score}</p>
    <p>Level Reached: ${level}</p>
    <p class="hs">High Score: ${highScore}</p>
    <p class="tapHint">Tap to Restart</p>
  `;
}

function showLevelComplete() {
  gameState = 'levelcomplete';
  overlay.classList.add('active');
  overlayInner.innerHTML = `
    <h1>LEVEL ${level} CLEAR!</h1>
    <p class="big">Score: ${score}</p>
    <p class="tapHint">Tap for Next Level</p>
  `;
}

function hideOverlay() {
  overlay.classList.remove('active');
}

// --- Input ---
let inputX = null;

function getInputX(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) return e.touches[0].clientX - rect.left;
  return e.clientX - rect.left;
}

canvas.addEventListener('mousemove', e => {
  inputX = getInputX(e);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  inputX = getInputX(e);
}, {passive: false});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  inputX = getInputX(e);
  handleTap();
}, {passive: false});
canvas.addEventListener('mousedown', e => {
  inputX = getInputX(e);
  handleTap();
});

function handleTap() {
  if (gameState === 'start') {
    hideOverlay();
    gameState = 'playing';
    launchBall();
  } else if (gameState === 'gameover') {
    hideOverlay();
    initGame();
  } else if (gameState === 'levelcomplete') {
    hideOverlay();
    level++;
    initLevel();
    updateHUD();
    gameState = 'playing';
    launchBall();
  } else if (gameState === 'playing') {
    // launch ball if any on paddle
    for (let b of balls) {
      if (b.onPaddle) {
        launchBallObj(b);
      }
    }
  }
}

function launchBall() {
  for (let b of balls) {
    if (b.onPaddle) launchBallObj(b);
  }
}

function launchBallObj(b) {
  b.onPaddle = false;
  const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.6;
  b.vx = Math.cos(angle) * b.speed;
  b.vy = Math.sin(angle) * b.speed;
}

// --- Particles ---
function spawnBrickParticles(brick) {
  const cx = brick.x + brick.w/2;
  const cy = brick.y + brick.h/2;
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3 + 1;
    particles.push({
      x: cx + (Math.random()-0.5)*brick.w*0.6,
      y: cy + (Math.random()-0.5)*brick.h*0.6,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1,
      decay: 0.02 + Math.random()*0.02,
      size: Math.random()*4+2,
      color: brick.color1
    });
  }
}

function spawnFloatText(x, y, text, color) {
  floatTexts.push({x, y, text, color, life: 1, vy: -1.5});
}

// --- Power-ups ---
function spawnPowerup(brick) {
  const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerups.push({
    x: brick.x + brick.w/2,
    y: brick.y + brick.h/2,
    type,
    vy: POWERUP_SPEED,
    life: 1,
    trail: []
  });
}

function activatePowerup(type) {
  if (type === 'wide') {
    activePowerups.wide = Date.now() + POWERUP_DURATION;
    paddle.w = 120;
    spawnFloatText(paddle.x, paddle.y - 20, 'WIDE!', POWERUP_COLORS.wide);
  } else if (type === 'multi') {
    // spawn 2 extra balls
    const existing = balls.filter(b => !b.onPaddle);
    if (existing.length > 0) {
      const ref = existing[0];
      for (let i = 0; i < 2; i++) {
        const angle = Math.atan2(ref.vy, ref.vx) + (i === 0 ? 0.4 : -0.4);
        balls.push({
          x: ref.x,
          y: ref.y,
          vx: Math.cos(angle) * ref.speed,
          vy: Math.sin(angle) * ref.speed,
          speed: ref.speed,
          onPaddle: false,
          fire: ref.fire,
          trail: []
        });
      }
    }
    spawnFloatText(paddle.x, paddle.y - 20, 'MULTI!', POWERUP_COLORS.multi);
  } else if (type === 'fire') {
    activePowerups.fire = Date.now() + POWERUP_DURATION;
    for (let b of balls) b.fire = true;
    spawnFloatText(paddle.x, paddle.y - 20, 'FIRE!', POWERUP_COLORS.fire);
  }
}

// --- Update ---
function update(dt) {
  if (gameState !== 'playing') return;
  const now = Date.now();

  // check powerup expirations
  if (activePowerups.wide && activePowerups.wide < now) {
    activePowerups.wide = 0;
    paddle.w = 80;
  }
  if (activePowerups.fire && activePowerups.fire < now) {
    activePowerups.fire = 0;
    for (let b of balls) b.fire = false;
  }

  // paddle movement (smoothed)
  if (inputX !== null) {
    paddle.targetX = Math.max(paddle.w/2, Math.min(W - paddle.w/2, inputX));
  }
  paddle.x += (paddle.targetX - paddle.x) * 0.25;

  // balls
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const b = balls[bi];

    // trail
    b.trail.push({x: b.x, y: b.y, a: 1});
    if (b.trail.length > 8) b.trail.shift();
    for (let t of b.trail) t.a *= 0.85;

    if (b.onPaddle) {
      b.x = paddle.x;
      b.y = paddle.y - BALL_RADIUS - paddle.h/2;
      continue;
    }

    b.x += b.vx;
    b.y += b.vy;

    // wall collisions
    if (b.x - BALL_RADIUS < 0) { b.x = BALL_RADIUS; b.vx = Math.abs(b.vx); }
    if (b.x + BALL_RADIUS > W) { b.x = W - BALL_RADIUS; b.vx = -Math.abs(b.vx); }
    if (b.y - BALL_RADIUS < 0) { b.y = BALL_RADIUS; b.vy = Math.abs(b.vy); }

    // fell below
    if (b.y - BALL_RADIUS > H) {
      balls.splice(bi, 1);
      if (balls.length === 0) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          showGameOver();
          return;
        }
        spawnBallOnPaddle();
        gameState = 'playing';
      }
      continue;
    }

    // paddle collision
    const px = paddle.x - paddle.w/2;
    const py = paddle.y - paddle.h/2;
    if (b.vy > 0 &&
        b.y + BALL_RADIUS >= py &&
        b.y + BALL_RADIUS <= py + paddle.h + 4 &&
        b.x >= px - BALL_RADIUS &&
        b.x <= px + paddle.w + BALL_RADIUS) {
      const hitPos = (b.x - paddle.x) / (paddle.w / 2); // -1 to 1
      const angle = hitPos * (Math.PI / 3) - Math.PI / 2; // -150 to -30 deg
      b.vx = Math.cos(angle) * b.speed;
      b.vy = Math.sin(angle) * b.speed;
      b.y = py - BALL_RADIUS;
    }

    // brick collision
    for (let brick of bricks) {
      if (!brick.alive) continue;
      if (b.x + BALL_RADIUS > brick.x &&
          b.x - BALL_RADIUS < brick.x + brick.w &&
          b.y + BALL_RADIUS > brick.y &&
          b.y - BALL_RADIUS < brick.y + brick.h) {

        brick.hp--;
        brick.shakeTime = 6;

        if (brick.hp <= 0) {
          brick.alive = false;
          score += brick.points;
          popScore();
          updateHUD();
          spawnBrickParticles(brick);
          spawnFloatText(brick.x + brick.w/2, brick.y, '+' + brick.points, brick.color1);
          if (brick.hasPowerup) spawnPowerup(brick);
        } else {
          brick.cracked = true;
          // small particles on crack
          for (let i = 0; i < 4; i++) {
            particles.push({
              x: b.x, y: b.y,
              vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
              life: 1, decay: 0.04, size: 2, color: '#fff'
            });
          }
        }

        // speed up
        if (b.speed < MAX_BALL_SPEED) {
          b.speed += SPEED_INCREMENT;
        }

        // bounce (unless fireball)
        if (!b.fire) {
          // determine collision side
          const overlapLeft = (b.x + BALL_RADIUS) - brick.x;
          const overlapRight = (brick.x + brick.w) - (b.x - BALL_RADIUS);
          const overlapTop = (b.y + BALL_RADIUS) - brick.y;
          const overlapBottom = (brick.y + brick.h) - (b.y - BALL_RADIUS);
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
          if (minOverlap === overlapTop || minOverlap === overlapBottom) {
            b.vy = -b.vy;
          } else {
            b.vx = -b.vx;
          }
          // normalize speed
          const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
          b.vx = (b.vx/spd) * b.speed;
          b.vy = (b.vy/spd) * b.speed;
          break; // only hit one brick per frame if not fireball
        }
      }
    }
  }

  // powerups
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const p = powerups[pi];
    p.y += p.vy;
    p.trail.push({x: p.x, y: p.y, a: 0.6});
    if (p.trail.length > 6) p.trail.shift();
    for (let t of p.trail) t.a *= 0.8;

    // paddle catch
    if (p.y + POWERUP_RADIUS >= paddle.y - paddle.h/2 &&
        p.y - POWERUP_RADIUS <= paddle.y + paddle.h/2 &&
        p.x >= paddle.x - paddle.w/2 - POWERUP_RADIUS &&
        p.x <= paddle.x + paddle.w/2 + POWERUP_RADIUS) {
      activatePowerup(p.type);
      powerups.splice(pi, 1);
      continue;
    }
    if (p.y > H + 20) { powerups.splice(pi, 1); }
  }

  // particles
  for (let pi = particles.length - 1; pi >= 0; pi--) {
    const p = particles[pi];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(pi, 1);
  }

  // float texts
  for (let fi = floatTexts.length - 1; fi >= 0; fi--) {
    const f = floatTexts[fi];
    f.y += f.vy;
    f.life -= 0.025;
    if (f.life <= 0) floatTexts.splice(fi, 1);
  }

  // check level complete
  if (bricks.every(b => !b.alive)) {
    showLevelComplete();
  }
}

// --- Draw ---
function draw(time) {
  ctx.clearRect(0, 0, W, H);

  // background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // stars
  for (let s of stars) {
    const twinkle = Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
    ctx.globalAlpha = s.a * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * (W/600), s.y * (H/900), s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // bricks
  for (let brick of bricks) {
    if (!brick.alive) continue;
    let bx = brick.x;
    let by = brick.y;
    if (brick.shakeTime > 0) {
      bx += (Math.random()-0.5) * 3;
      by += (Math.random()-0.5) * 3;
      brick.shakeTime--;
    }
    const grad = ctx.createLinearGradient(bx, by, bx, by + brick.h);
    const alpha = brick.hp / brick.maxHp;
    grad.addColorStop(0, brick.color1);
    grad.addColorStop(1, brick.color2);
    ctx.fillStyle = grad;
    roundRect(ctx, bx, by, brick.w, brick.h, 3);
    ctx.fill();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, bx + 2, by + 1, brick.w - 4, brick.h * 0.4, 2);
    ctx.fill();

    // crack lines
    if (brick.cracked) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const cx = bx + brick.w * 0.5;
      const cy = by + brick.h * 0.5;
      ctx.moveTo(cx - 8, cy - 2);
      ctx.lineTo(cx, cy + 1);
      ctx.lineTo(cx + 6, cy - 3);
      ctx.moveTo(cx - 2, cy - 4);
      ctx.lineTo(cx + 1, cy + 4);
      ctx.stroke();
    }

    // hp indicator for multi-hit
    if (brick.maxHp > 1 && brick.hp > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(brick.hp, bx + brick.w/2, by + brick.h/2);
    }
  }

  // powerups
  for (let p of powerups) {
    // trail
    for (let t of p.trail) {
      ctx.globalAlpha = t.a * 0.4;
      ctx.fillStyle = POWERUP_COLORS[p.type];
      ctx.beginPath();
      ctx.arc(t.x, t.y, POWERUP_RADIUS * 0.7, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // glow
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, POWERUP_RADIUS * 2);
    glow.addColorStop(0, POWERUP_COLORS[p.type] + '44');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, POWERUP_RADIUS * 2, 0, Math.PI*2);
    ctx.fill();

    // icon
    ctx.fillStyle = POWERUP_COLORS[p.type];
    ctx.beginPath();
    ctx.arc(p.x, p.y, POWERUP_RADIUS, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = {wide:'W', multi:'M', fire:'F'};
    ctx.fillText(icons[p.type], p.x, p.y + 1);
  }

  // paddle
  drawPaddle();

  // balls
  for (let b of balls) {
    // trail
    for (let i = 0; i < b.trail.length; i++) {
      const t = b.trail[i];
      ctx.globalAlpha = t.a * 0.5;
      ctx.fillStyle = b.fire ? '#ff6633' : '#fff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, BALL_RADIUS * (0.3 + t.a * 0.5), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // ball glow
    if (b.fire) {
      const fg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, BALL_RADIUS * 3);
      fg.addColorStop(0, 'rgba(255,100,0,0.3)');
      fg.addColorStop(1, 'transparent');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(b.x, b.y, BALL_RADIUS * 3, 0, Math.PI*2);
      ctx.fill();
    }

    // ball
    const bg = ctx.createRadialGradient(b.x - 2, b.y - 2, 0, b.x, b.y, BALL_RADIUS);
    if (b.fire) {
      bg.addColorStop(0, '#ffdd44');
      bg.addColorStop(0.5, '#ff6633');
      bg.addColorStop(1, '#cc2200');
    } else {
      bg.addColorStop(0, '#ffffff');
      bg.addColorStop(1, '#aabbcc');
    }
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI*2);
    ctx.fill();
  }

  // particles
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // float texts
  for (let f of floatTexts) {
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  // powerup timer indicators
  drawPowerupTimers();
}

function drawPaddle() {
  const px = paddle.x - paddle.w/2;
  const py = paddle.y - paddle.h/2;

  // glow
  const glowGrad = ctx.createRadialGradient(paddle.x, paddle.y, 0, paddle.x, paddle.y, paddle.w * 0.7);
  glowGrad.addColorStop(0, 'rgba(100,150,255,0.12)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(paddle.x, paddle.y, paddle.w * 0.7, paddle.h * 2.5, 0, 0, Math.PI*2);
  ctx.fill();

  // paddle body
  const grad = ctx.createLinearGradient(px, py, px, py + paddle.h);
  grad.addColorStop(0, '#8899bb');
  grad.addColorStop(0.3, '#ccddef');
  grad.addColorStop(0.5, '#ffffff');
  grad.addColorStop(0.7, '#ccddef');
  grad.addColorStop(1, '#667799');
  ctx.fillStyle = grad;
  roundRect(ctx, px, py, paddle.w, paddle.h, 7);
  ctx.fill();

  // shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  roundRect(ctx, px + 4, py + 1, paddle.w - 8, paddle.h * 0.35, 3);
  ctx.fill();

  // fire outline
  if (activePowerups.fire > Date.now()) {
    ctx.strokeStyle = 'rgba(255,80,20,0.5)';
    ctx.lineWidth = 2;
    roundRect(ctx, px - 1, py - 1, paddle.w + 2, paddle.h + 2, 8);
    ctx.stroke();
  }
}

function drawPowerupTimers() {
  const now = Date.now();
  let y = H - 60;
  if (activePowerups.wide > now) {
    const pct = (activePowerups.wide - now) / POWERUP_DURATION;
    ctx.fillStyle = POWERUP_COLORS.wide;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(8, y, pct * 50, 4);
    ctx.globalAlpha = 1;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = POWERUP_COLORS.wide;
    ctx.textAlign = 'left';
    ctx.fillText('WIDE', 8, y - 3);
    y -= 16;
  }
  if (activePowerups.fire > now) {
    const pct = (activePowerups.fire - now) / POWERUP_DURATION;
    ctx.fillStyle = POWERUP_COLORS.fire;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(8, y, pct * 50, 4);
    ctx.globalAlpha = 1;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = POWERUP_COLORS.fire;
    ctx.textAlign = 'left';
    ctx.fillText('FIRE', 8, y - 3);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Game Loop ---
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 3); // cap delta
  lastTime = timestamp;
  update(dt);
  draw(timestamp);
  animFrame = requestAnimationFrame(gameLoop);
}

// --- Start ---
resize();
initGame();
lastTime = performance.now();
animFrame = requestAnimationFrame(gameLoop);

})();
</script>
