<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mid-Autumn Lucky Wheel</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
    background: #0a0a1a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 12px 16px 24px;
    position: relative;
  }
  .moon-glow {
    position: fixed;
    top: -120px; right: -120px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,50,0.18) 0%, rgba(255,160,20,0.08) 45%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
    animation: moonPulse 6s ease-in-out infinite;
  }
  @keyframes moonPulse {
    0%,100% { opacity:0.7; transform:scale(1); }
    50%     { opacity:1;   transform:scale(1.06); }
  }
  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle  { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%  { transform:translateY(100vh) rotate(0deg);    opacity:0;   }
    10% { opacity:1; }
    90% { opacity:0.5; }
    100%{ transform:translateY(-120px) rotate(360deg); opacity:0; }
  }
  .back-btn {
    position:absolute; top:14px; left:14px;
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 14px;
    background:rgba(255,160,20,.1);
    border:1px solid rgba(255,160,20,.25);
    border-radius:10px;
    color:#f5a623; font-size:14px; text-decoration:none;
    transition:background .2s, color .2s, border-color .2s;
    z-index:50;
  }
  .back-btn:hover, .back-btn:active {
    background:rgba(255,160,20,.2); color:#ffd700;
    border-color:rgba(255,215,0,.4);
  }
  .back-btn svg { width:16px; height:16px; fill:currentColor; }
  .title-wrap { position:relative; z-index:1; text-align:center; margin-top:48px; }
  .title {
    font-size:clamp(26px,7vw,42px); font-weight:800;
    background:linear-gradient(135deg,#ff8c00 0%,#ffd700 35%,#ff6b35 60%,#ffa500 80%,#ffd700 100%);
    background-size:300% 300%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation:goldShift 4s ease infinite;
    letter-spacing:-0.5px; line-height:1.15;
  }
  @keyframes goldShift {
    0%,100%{ background-position:0% 50%; }
    50%    { background-position:100% 50%; }
  }
  .subtitle { margin-top:6px; font-size:14px; color:rgba(255,200,80,.5); text-align:center; }
  .wheel-wrapper {
    position:relative; z-index:1; margin-top:20px;
    width:min(88vw,400px); height:min(88vw,400px); flex-shrink:0;
  }
  .wheel-glow {
    position:absolute; inset:-14px; border-radius:50%;
    background:conic-gradient(#ff8c00,#ffd700,#ff6b35,#ffa500,#c45e00,#dc2626,#b45309,#d97706,#ff8c00);
    filter:blur(20px); opacity:.38;
    animation:glowPulse 3s ease-in-out infinite; pointer-events:none;
  }
  @keyframes glowPulse {
    0%,100%{ opacity:.30; transform:scale(1); }
    50%    { opacity:.50; transform:scale(1.04); }
  }
  .wheel-border {
    position:absolute; inset:-6px; border-radius:50%;
    border:3px solid rgba(255,200,50,.2); pointer-events:none;
  }
  canvas#wheel { display:block; width:100%; height:100%; border-radius:50%; position:relative; z-index:2; }
  .pointer {
    position:absolute; top:-20px; left:50%; transform:translateX(-50%);
    width:0; height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:36px solid #ffd700;
    filter:drop-shadow(0 0 10px rgba(255,215,0,.85)) drop-shadow(0 2px 4px rgba(0,0,0,.5));
    z-index:10;
  }
  .pointer::after {
    content:''; position:absolute; top:-40px; left:-7px;
    width:14px; height:14px;
    background:radial-gradient(circle,#fff8c0,#ffd700);
    border-radius:50%;
    box-shadow:0 0 12px rgba(255,215,0,.9),0 0 24px rgba(255,165,0,.5);
  }
  .center-btn {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:72px; height:72px; border-radius:50%;
    border:3px solid rgba(255,200,50,.4);
    background:radial-gradient(circle,#1c0f00 0%,#0a0a1a 100%);
    color:#ffd700; font-size:15px; font-weight:800; letter-spacing:1.5px;
    cursor:pointer; z-index:12;
    box-shadow:0 0 20px rgba(255,160,20,.35),inset 0 0 12px rgba(255,160,20,.15);
    transition:transform .2s, box-shadow .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .center-btn:hover {
    transform:translate(-50%,-50%) scale(1.08);
    box-shadow:0 0 32px rgba(255,200,50,.6),inset 0 0 16px rgba(255,160,20,.25);
  }
  .center-btn:active { transform:translate(-50%,-50%) scale(0.95); }
  .center-btn.disabled { pointer-events:none; opacity:.45; }
  .center-btn.spinning { animation:centerPulse 0.8s ease-in-out infinite alternate; }
  @keyframes centerPulse {
    from { box-shadow:0 0 20px rgba(255,160,20,.35),inset 0 0 12px rgba(255,160,20,.15); }
    to   { box-shadow:0 0 42px rgba(255,200,50,.75),inset 0 0 20px rgba(255,160,20,.3); }
  }
  .overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,.78);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity .4s;
  }
  .overlay.show { opacity:1; pointer-events:auto; }
  .result-card {
    background:linear-gradient(145deg,#1a0d00,#100800,#1a0d00);
    border:1px solid rgba(255,200,50,.22); border-radius:24px;
    padding:36px 32px 32px; text-align:center;
    max-width:340px; width:88%;
    transform:scale(.8) translateY(30px);
    transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(255,160,20,.08),inset 0 1px 0 rgba(255,200,50,.1);
    position:relative; overflow:hidden;
  }
  .result-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,rgba(255,200,50,.65),transparent);
  }
  .overlay.show .result-card { transform:scale(1) translateY(0); }
  .result-emoji { font-size:60px; margin-bottom:10px; animation:emojiPop .5s ease .25s both; line-height:1; }
  @keyframes emojiPop {
    0%  { transform:scale(0) rotate(-20deg); }
    60% { transform:scale(1.3) rotate(6deg); }
    100%{ transform:scale(1) rotate(0); }
  }
  .result-won-label {
    font-size:11px; color:rgba(255,200,80,.5);
    text-transform:uppercase; letter-spacing:2.5px; margin-bottom:8px;
  }
  .result-prize { font-size:26px; font-weight:800; margin-bottom:8px; line-height:1.3; }
  .result-desc  { font-size:13px; color:rgba(255,200,80,.45); margin-bottom:26px; line-height:1.6; min-height:20px; }
  .btn-spin-again {
    padding:14px 40px; border:none; border-radius:14px;
    font-size:16px; font-weight:700; color:#1a0800; cursor:pointer;
    background:linear-gradient(135deg,#ffd700 0%,#ff8c00 50%,#ffa500 100%);
    box-shadow:0 4px 20px rgba(255,160,20,.45);
    transition:transform .2s, box-shadow .2s; letter-spacing:0.5px;
  }
  .btn-spin-again:hover { transform:scale(1.05); box-shadow:0 6px 28px rgba(255,160,20,.6); }
  .btn-spin-again:active { transform:scale(.97); }
  #confetti { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:120; }
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star  { position:absolute; background:#fff; border-radius:50%; animation:twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%,100%{ opacity:0.12; transform:scale(1);   }
    50%    { opacity:0.7;  transform:scale(1.4); }
  }
  .footer {
    position:relative; z-index:1; margin-top:auto; padding-top:20px;
    font-size:12px; color:rgba(255,200,80,.25); text-align:center; letter-spacing:0.4px;
  }
  @media (max-height:640px) {
    .title-wrap { margin-top:36px; }
    .title { font-size:22px; }
    .subtitle { display:none; }
    .wheel-wrapper { margin-top:10px; }
  }
</style>
</head>
<body>

<div class="moon-glow"></div>
<div class="stars" id="starsContainer"></div>
<div class="particles" id="particlesContainer"></div>

<a href="../index.html" class="back-btn">
  <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  Back
</a>

<div class="title-wrap">
  <h1 class="title">&#127857; Mid-Autumn Lucky Wheel</h1>
  <p class="subtitle">Spin to win Mid-Autumn prizes!</p>
</div>

<div class="wheel-wrapper" id="wheelWrapper">
  <div class="wheel-glow"></div>
  <div class="wheel-border"></div>
  <canvas id="wheel"></canvas>
  <div class="pointer"></div>
  <button class="center-btn" id="spinBtn">SPIN</button>
</div>

<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-won-label">Your Prize</div>
    <div class="result-prize" id="resultPrize"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="btn-spin-again" id="spinAgainBtn">&#127857; Spin Again</button>
  </div>
</div>

<canvas id="confetti"></canvas>
<div class="footer">Press SPIN to try your luck &#127765;</div>

<script>
var SEGMENTS = [
  { label: 'Room Voucher 500K! 🏨',   emoji: '🏨',  color: '#c45e00', weight: 1,  desc: 'You won a 500K room booking voucher! Visit ibookingu5.myghs.com/demo — Code: LUCKY500K', isSpecial: true  },
  { label: 'Room Discount 300K! 🏷️', emoji: '🏷️', color: '#dc2626', weight: 3,  desc: 'A 300K room discount! Use code ROOM300K at ibookingu5.myghs.com/demo',                   isSpecial: true  },
  { label: '15% Off Booking! 🎫',     emoji: '🎫',  color: '#b45309', weight: 5,  desc: 'Promo code MIDAUTUMN15 — 15% off any room at ibookingu5.myghs.com/demo',                 isSpecial: true  },
  { label: '500 Points',   emoji: '⭐',     color: '#d97706', weight: 8,  desc: '500 bonus points added to your account',   isSpecial: false },
  { label: 'Try Again',    emoji: '🌕', color: '#92400e', weight: 10, desc: 'Better luck next time!',                              isSpecial: false },
  { label: '200 Points',   emoji: '🌟', color: '#a16207', weight: 12, desc: '200 bonus points added to your account',   isSpecial: false },
  { label: '100 Points',   emoji: '🍂', color: '#78350f', weight: 15, desc: '100 bonus points added to your account',   isSpecial: false },
  { label: 'Try Again',    emoji: '🌙', color: '#7c2d12', weight: 15, desc: 'Good luck next time!',                                    isSpecial: false }
];

var canvas = document.getElementById('wheel');
var ctx    = canvas.getContext('2d');
var wrapper = document.getElementById('wheelWrapper');
var SIZE, CENTER, RADIUS;
var currentRotation = 0;
var isSpinning = false;

function resizeCanvas() {
  var rect = wrapper.getBoundingClientRect();
  var dpr  = Math.min(window.devicePixelRatio || 1, 2);
  SIZE   = Math.round(rect.width);
  canvas.width  = SIZE * dpr;
  canvas.height = SIZE * dpr;
  canvas.style.width  = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CENTER = SIZE / 2;
  RADIUS = SIZE / 2 - 4;
  drawWheel(currentRotation);
}
window.addEventListener('resize', resizeCanvas);

function lighten(hex, amt) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')';
}
function darken(hex, amt) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')';
}

function drawWheel(rotation) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  var total = SEGMENTS.reduce(function(s,seg){return s+seg.weight;},0);
  var startAngle = rotation;
  SEGMENTS.forEach(function(seg) {
    var angle = (seg.weight/total)*Math.PI*2;
    var grad  = ctx.createRadialGradient(CENTER,CENTER,RADIUS*0.1,CENTER,CENTER,RADIUS);
    grad.addColorStop(0, lighten(seg.color, 30));
    grad.addColorStop(0.55, seg.color);
    grad.addColorStop(1, darken(seg.color, 20));
    ctx.beginPath();
    ctx.moveTo(CENTER, CENTER);
    ctx.arc(CENTER, CENTER, RADIUS, startAngle, startAngle+angle);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(CENTER,CENTER,RADIUS-3,startAngle+0.015,startAngle+angle-0.015);
    ctx.strokeStyle = 'rgba(255,200,50,0.2)';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.save();
    ctx.translate(CENTER, CENTER);
    ctx.rotate(startAngle + angle/2);
    ctx.textAlign = 'right';
    var fs = Math.max(10, SIZE*0.036);
    ctx.font = 'bold '+fs+'px Segoe UI,system-ui,sans-serif';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 4;
    var fullText = seg.emoji+' '+seg.label;
    var maxW = RADIUS*0.60;
    var display = fullText;
    while(ctx.measureText(display).width > maxW && display.length > 3) display = display.slice(0,-1);
    if(display.length < fullText.length) display += '..';
    ctx.fillText(display, RADIUS-14, fs*0.38);
    ctx.restore();
    startAngle += angle;
  });
  var dotTotal = total, dotAngle = rotation;
  SEGMENTS.forEach(function(seg){
    var angle = (seg.weight/dotTotal)*Math.PI*2;
    var bx = CENTER+Math.cos(dotAngle)*(RADIUS-6);
    var by = CENTER+Math.sin(dotAngle)*(RADIUS-6);
    ctx.beginPath();
    ctx.arc(bx,by,3,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,215,0,0.7)';
    ctx.shadowColor = 'rgba(255,215,0,0.9)';
    ctx.shadowBlur = 5;
    ctx.fill();
    ctx.shadowBlur = 0;
    dotAngle += angle;
  });
  ctx.beginPath(); ctx.arc(CENTER,CENTER,38,0,Math.PI*2); ctx.fillStyle='#0a0a1a'; ctx.fill();
  ctx.beginPath(); ctx.arc(CENTER,CENTER,38,0,Math.PI*2); ctx.strokeStyle='rgba(255,200,50,0.45)'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(CENTER,CENTER,30,0,Math.PI*2); ctx.strokeStyle='rgba(255,200,50,0.14)'; ctx.lineWidth=1; ctx.stroke();
}

var spinBtn     = document.getElementById('spinBtn');
var overlay     = document.getElementById('overlay');
var resultEmoji = document.getElementById('resultEmoji');
var resultPrize = document.getElementById('resultPrize');
var resultDesc  = document.getElementById('resultDesc');
var spinAgainBtn= document.getElementById('spinAgainBtn');

spinBtn.addEventListener('click', startSpin);
spinBtn.addEventListener('touchend', function(e){ e.preventDefault(); startSpin(); });
spinAgainBtn.addEventListener('click', closeThenSpin);
overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.classList.remove('show'); });

function startSpin() {
  if(isSpinning) return;
  isSpinning = true;
  spinBtn.classList.add('disabled','spinning');
  var total = SEGMENTS.reduce(function(s,seg){return s+seg.weight;},0);
  var rand = Math.random()*total;
  var chosenIdx = SEGMENTS.length-1;
  for(var i=0;i<SEGMENTS.length;i++){ rand-=SEGMENTS[i].weight; if(rand<=0){chosenIdx=i;break;} }
  var totalW = total, segStart=0;
  for(var j=0;j<chosenIdx;j++) segStart += (SEGMENTS[j].weight/totalW)*Math.PI*2;
  var segAngle = (SEGMENTS[chosenIdx].weight/totalW)*Math.PI*2;
  var jitter   = (Math.random()-0.5)*segAngle*0.5;
  var segMid   = segStart + segAngle/2 + jitter;
  var targetOffset  = -Math.PI/2 - segMid;
  var fullSpins     = (5+Math.floor(Math.random()*5))*Math.PI*2;
  var rotationAdd   = ((targetOffset-(currentRotation%(Math.PI*2)))%(Math.PI*2)+Math.PI*4)%(Math.PI*2);
  var targetRotation = currentRotation + fullSpins + rotationAdd;
  var startTime     = performance.now();
  var duration      = 4000 + Math.random()*2000;
  var startRotation = currentRotation;
  function animate(now) {
    var elapsed  = now-startTime;
    var progress = Math.min(elapsed/duration,1);
    var ease     = 1-Math.pow(1-progress,4);
    currentRotation = startRotation+(targetRotation-startRotation)*ease;
    drawWheel(currentRotation);
    if(progress<1){ requestAnimationFrame(animate); }
    else {
      currentRotation = targetRotation;
      drawWheel(currentRotation);
      isSpinning = false;
      spinBtn.classList.remove('disabled','spinning');
      showResult(SEGMENTS[chosenIdx]);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(seg) {
  resultEmoji.textContent = seg.emoji;
  resultPrize.textContent = seg.label;
  var darkColors = ['#78350f','#7c2d12','#92400e'];
  resultPrize.style.color = darkColors.indexOf(seg.color)>=0 ? '#fbbf24' : lighten(seg.color,55);
  resultDesc.textContent  = seg.desc||'';
  overlay.classList.add('show');
  if(seg.isSpecial) launchConfetti();
}

function closeThenSpin() {
  overlay.classList.remove('show');
  setTimeout(startSpin, 460);
}

var confettiCanvas = document.getElementById('confetti');
var cCtx = confettiCanvas.getContext('2d');
var confettiPieces = [], confettiRunning = false;
function resizeConfetti(){ confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight; }
window.addEventListener('resize', resizeConfetti);
resizeConfetti();
var CC = ['#ffd700','#ff8c00','#ffa500','#ff6b35','#dc2626','#b45309','#d97706','#f59e0b','#fbbf24','#ef4444','#c45e00','#fed7aa'];
var SH = ['rect','circle','diamond'];
function launchConfetti() {
  confettiPieces = [];
  for(var i=0;i<150;i++) confettiPieces.push({
    x:window.innerWidth/2+(Math.random()-0.5)*280, y:window.innerHeight/2-110,
    w:Math.random()*9+4, h:Math.random()*5+2,
    color:CC[Math.floor(Math.random()*CC.length)],
    vx:(Math.random()-0.5)*18, vy:-(Math.random()*16+4),
    rotation:Math.random()*360, rotSpeed:(Math.random()-0.5)*14,
    gravity:0.2+Math.random()*0.1, opacity:1,
    decay:0.003+Math.random()*0.004, shape:SH[Math.floor(Math.random()*SH.length)]
  });
  if(!confettiRunning){ confettiRunning=true; animateConfetti(); }
}
function animateConfetti() {
  cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  for(var i=confettiPieces.length-1;i>=0;i--) {
    var p=confettiPieces[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.992;
    p.rotation+=p.rotSpeed; p.opacity-=p.decay;
    if(p.opacity<=0||p.y>confettiCanvas.height+30){ confettiPieces.splice(i,1); continue; }
    cCtx.save();
    cCtx.translate(p.x,p.y);
    cCtx.rotate(p.rotation*Math.PI/180);
    cCtx.globalAlpha=Math.max(0,p.opacity);
    cCtx.fillStyle=p.color;
    if(p.shape==='rect'){ cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
    else if(p.shape==='circle'){ cCtx.beginPath(); cCtx.arc(0,0,p.w/2,0,Math.PI*2); cCtx.fill(); }
    else { cCtx.beginPath(); cCtx.moveTo(0,-p.h); cCtx.lineTo(p.w/2,0); cCtx.lineTo(0,p.h); cCtx.lineTo(-p.w/2,0); cCtx.closePath(); cCtx.fill(); }
    cCtx.restore();
  }
  if(confettiPieces.length>0){ requestAnimationFrame(animateConfetti); }
  else { confettiRunning=false; cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
}

function createStars() {
  var c=document.getElementById('starsContainer');
  for(var i=0;i<55;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=Math.random()*2.5+0.8;
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
    s.style.animation='twinkle '+(2.5+Math.random()*4)+'s '+(Math.random()*5)+'s ease-in-out infinite';
    c.appendChild(s);
  }
}
function createParticles() {
  var c=document.getElementById('particlesContainer');
  var cfg=[
    {sz:3,col:'rgba(255,200,50,0.5)',d:'0s',dur:'12s'},
    {sz:2,col:'rgba(255,140,0,0.4)',d:'2s',dur:'15s'},
    {sz:4,col:'rgba(220,100,0,0.35)',d:'4s',dur:'10s'},
    {sz:2,col:'rgba(255,215,0,0.5)',d:'1s',dur:'14s'},
